apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-agent-runtime
  namespace: agent-runtime
  labels:
    app.kubernetes.io/part-of: agentic-sdlc
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-agent-runtime
  namespace: agent-runtime
  labels:
    app.kubernetes.io/part-of: agentic-sdlc
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
