openclaw-operator:
  replicaCount: 1

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

  webhook:
    enabled: false

  networkPolicy:
    enabled: true

  crds:
    install: true
    keep: true
