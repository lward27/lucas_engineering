# Tekton Dashboard - wrapped official release manifest
# To upgrade: replace templates/release.yaml with the new release from
# https://github.com/tektoncd/dashboard/releases/download/<version>/release.yaml
# and update appVersion in Chart.yaml to match.

ingress:
  enabled: true
  host: tekton.lucas.engineering
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: tekton-lucas-engineering-tls
