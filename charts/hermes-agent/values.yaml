hermes:
  name: hermes-agent

  runtime:
    # kubernetes: run Hermes in this chart as a StatefulSet.
    # external: keep only the cluster front door and proxy to a desktop host.
    mode: external

  external:
    host: 192.168.50.145
    port: 9120

  image:
    repository: nousresearch/hermes-agent
    tag: "v2026.4.30"
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    automountToken: false

  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi

  secrets:
    # Create this manually. Expected keys are whichever providers/platforms you enable,
    # for example FIREWORKS_API_KEY, GH_TOKEN, TELEGRAM_BOT_TOKEN, and API_SERVER_KEY.
    apiKeysName: hermes-api-keys
    apiKeysOptional: true
    # Optional secret with key "config" containing a kubeconfig for cluster operations.
    kubeconfigName: hermes-kubeconfig
    kubeconfigOptional: true
    # Optional secret with id_ed25519, id_ed25519.pub, known_hosts, and config.
    sshName: hermes-ssh
    sshOptional: true

  config:
    overwriteOnStart: false
    # Existing PVC-backed installs keep /data/config.yaml. This targeted sync
    # updates GitOps-managed model/provider keys without replacing the rest.
    syncModelProvidersOnStart: true
    # Remove obsolete provider keys from the PVC config during model/provider sync.
    pruneProviderKeysOnStart:
      - lmstudio
    timezone: America/New_York
    model:
      provider: custom:lmstudio_lan
      default: google/gemma-4-e4b
    providers:
      lmstudio_lan:
        name: LM Studio LAN
        baseUrl: http://192.168.50.145:1234/v1
        keyEnv: ""
        transport: chat_completions
      fireworks:
        name: Fireworks
        baseUrl: https://api.fireworks.ai/inference/v1
        keyEnv: FIREWORKS_API_KEY
        transport: chat_completions
    terminal:
      cwd: /opt/data/workspace
    display:
      compact: true
      toolProgress: all
      interimAssistantMessages: true

  gateway:
    telegram:
      enabled: true
      dmPolicy: allowlist
      allowFrom:
        - "8635782483"
    apiServer:
      enabled: false
      host: 0.0.0.0
      port: 8642
    webhook:
      enabled: false
      port: 8644

  dashboard:
    enabled: true
    port: 9119
    embeddedChat: true
    tuiDir: /opt/data/ui-tui
    proxy:
      # Hermes dashboard WebSocket endpoints intentionally reject non-loopback
      # peers. Ingress traffic reaches the pod from the ingress controller IP,
      # so route it through an in-pod loopback proxy before it hits Uvicorn.
      enabled: true
      image: nginxinc/nginx-unprivileged:1.27-alpine
      port: 9120

  tools:
    kubectl:
      enabled: true
      image: bitnami/kubectl:latest
    gh:
      enabled: true
      image: alpine:3.20
      version: 2.69.0

  service:
    type: ClusterIP

  ingress:
    enabled: true
    className: nginx
    host: hermes.lucas.engineering
    clusterIssuer: letsencrypt-prod
    tlsSecretName: hermes-lucas-engineering-tls
    # Set to dashboard or api-server when enabling ingress.
    servicePortName: dashboard
    annotations: {}

  networkPolicy:
    enabled: true
    homelabCidr: 192.168.20.0/24
    extraEgress:
      - to:
          - ipBlock:
              cidr: 192.168.50.145/32
        ports:
          - port: 1234
            protocol: TCP

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi

  dashboardResources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  dashboardProxyResources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi
