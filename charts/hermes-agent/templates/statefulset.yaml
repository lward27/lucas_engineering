{{- if eq .Values.hermes.runtime.mode "kubernetes" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.hermes.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.hermes.name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  serviceName: {{ .Values.hermes.name }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.hermes.name }}
      app.kubernetes.io/instance: {{ .Values.hermes.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.hermes.name }}
        app.kubernetes.io/instance: {{ .Values.hermes.name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.hermes.name }}
      automountServiceAccountToken: {{ .Values.hermes.serviceAccount.automountToken }}
      securityContext:
        fsGroup: 10000
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.37
          command:
            - sh
            - /config/init-config.sh
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        {{- if .Values.hermes.config.syncModelProvidersOnStart }}
        - name: sync-model-providers
          image: {{ .Values.hermes.image.repository }}:{{ .Values.hermes.image.tag }}
          imagePullPolicy: {{ .Values.hermes.image.pullPolicy }}
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data
            - name: TZ
              value: {{ .Values.hermes.config.timezone | quote }}
          command:
            - sh
            - -c
            - |
              set -eu
              HERMES=/opt/hermes/.venv/bin/hermes
              {{- if .Values.hermes.config.pruneProviderKeysOnStart }}
              /opt/hermes/.venv/bin/python3 - <<'PY'
              from pathlib import Path
              import yaml

              config_path = Path("/opt/data/config.yaml")
              data = yaml.safe_load(config_path.read_text()) or {}
              providers = data.get("providers")
              if isinstance(providers, dict):
                  for provider_key in {{ .Values.hermes.config.pruneProviderKeysOnStart | toJson }}:
                      providers.pop(provider_key, None)
                  config_path.write_text(yaml.safe_dump(data, sort_keys=False))
              PY
              {{- end }}
              "$HERMES" config set model.provider {{ .Values.hermes.config.model.provider | quote }}
              "$HERMES" config set model.default {{ .Values.hermes.config.model.default | quote }}
              {{- range $name, $provider := .Values.hermes.config.providers }}
              "$HERMES" config set providers.{{ $name }}.name {{ $provider.name | quote }}
              "$HERMES" config set providers.{{ $name }}.base_url {{ $provider.baseUrl | quote }}
              "$HERMES" config set providers.{{ $name }}.key_env {{ $provider.keyEnv | quote }}
              "$HERMES" config set providers.{{ $name }}.transport {{ $provider.transport | quote }}
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: /opt/data
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 10000
            runAsGroup: 10000
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
        {{- end }}

        {{- if .Values.hermes.tools.kubectl.enabled }}
        - name: install-kubectl
          image: {{ .Values.hermes.tools.kubectl.image }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /opt/bitnami/kubectl/bin/kubectl /tools/kubectl
              chmod +x /tools/kubectl
          volumeMounts:
            - name: tools-bin
              mountPath: /tools
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            capabilities:
              drop: [ALL]
        {{- end }}

        {{- if .Values.hermes.tools.gh.enabled }}
        - name: install-gh
          image: {{ .Values.hermes.tools.gh.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: GH_VERSION
              value: {{ .Values.hermes.tools.gh.version | quote }}
          command:
            - sh
            - -c
            - |
              set -eu
              LOCAL=/data/.local/bin
              if [ -x "$LOCAL/gh" ]; then
                exit 0
              fi
              apk add --no-cache curl tar gzip ca-certificates
              mkdir -p "$LOCAL"
              cd /tmp
              curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -o gh.tar.gz
              tar --no-same-owner -xzf gh.tar.gz "gh_${GH_VERSION}_linux_amd64/bin/gh"
              cp "gh_${GH_VERSION}_linux_amd64/bin/gh" "$LOCAL/gh"
              chmod +x "$LOCAL/gh"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            capabilities:
              drop: [ALL]
        {{- end }}

        {{- if and .Values.hermes.dashboard.enabled .Values.hermes.dashboard.embeddedChat }}
        - name: cleanup-dashboard-tui
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              rm -rf /data/ui-tui /data/ui-tui.tmp
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            capabilities:
              drop: [ALL]

        - name: prepare-dashboard-tui
          image: {{ .Values.hermes.image.repository }}:{{ .Values.hermes.image.tag }}
          imagePullPolicy: {{ .Values.hermes.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -eu
              SRC=/opt/hermes/ui-tui
              DEST=/data/ui-tui
              MARKER="$DEST/.hermes-image-tag"
              if [ ! -f "$DEST/dist/entry.js" ] || [ ! -f "$MARKER" ] || [ "$(cat "$MARKER")" != "{{ .Values.hermes.image.tag }}" ]; then
                rm -rf "$DEST.tmp"
                mkdir -p "$DEST.tmp"
                cp -R "$SRC/." "$DEST.tmp/"
                echo "{{ .Values.hermes.image.tag }}" > "$DEST.tmp/.hermes-image-tag"
                rm -rf "$DEST"
                mv "$DEST.tmp" "$DEST"
              fi
              cd "$DEST"
              npm install --silent --no-fund --no-audit --progress=false
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 10000
            runAsGroup: 10000
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
        {{- end }}
      containers:
        - name: gateway
          image: {{ .Values.hermes.image.repository }}:{{ .Values.hermes.image.tag }}
          imagePullPolicy: {{ .Values.hermes.image.pullPolicy }}
          args:
            - gateway
            - run
          {{- if or .Values.hermes.gateway.apiServer.enabled .Values.hermes.gateway.webhook.enabled }}
          ports:
            {{- if .Values.hermes.gateway.apiServer.enabled }}
            - name: api-server
              containerPort: {{ .Values.hermes.gateway.apiServer.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.hermes.gateway.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.hermes.gateway.webhook.port }}
              protocol: TCP
            {{- end }}
          {{- end }}
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: HOME
              value: /opt/data
            - name: TZ
              value: {{ .Values.hermes.config.timezone | quote }}
            - name: PATH
              value: "/opt/tools:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: KUBECONFIG
              value: /opt/data/home/.kube/config
            - name: API_SERVER_ENABLED
              value: {{ .Values.hermes.gateway.apiServer.enabled | quote }}
            - name: API_SERVER_HOST
              value: {{ .Values.hermes.gateway.apiServer.host | quote }}
            - name: API_SERVER_PORT
              value: {{ .Values.hermes.gateway.apiServer.port | quote }}
            - name: WEBHOOK_PORT
              value: {{ .Values.hermes.gateway.webhook.port | quote }}
            {{- if .Values.hermes.gateway.telegram.allowFrom }}
            - name: TELEGRAM_ALLOWED_USERS
              value: {{ join "," .Values.hermes.gateway.telegram.allowFrom | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.hermes.secrets.apiKeysName }}
                optional: {{ .Values.hermes.secrets.apiKeysOptional }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - grep -q gateway_state /opt/data/gateway_state.json && grep -q running /opt/data/gateway_state.json
            failureThreshold: 6
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >-
                  pgrep -f '/opt/hermes/.venv/bin/[h]ermes gateway run' >/dev/null &&
                  grep -q '"gateway_state": "running"' /opt/data/gateway_state.json
            failureThreshold: 6
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.hermes.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: tools-bin
              mountPath: /opt/tools
            - name: tmp
              mountPath: /tmp
            - name: kubeconfig
              mountPath: /opt/data/home/.kube
              readOnly: true
            - name: ssh-keys
              mountPath: /opt/data/home/.ssh
              readOnly: true

        {{- if .Values.hermes.dashboard.enabled }}
        - name: dashboard
          image: {{ .Values.hermes.image.repository }}:{{ .Values.hermes.image.tag }}
          imagePullPolicy: {{ .Values.hermes.image.pullPolicy }}
          args:
            - dashboard
            - --host
            - {{ ternary "127.0.0.1" "0.0.0.0" .Values.hermes.dashboard.proxy.enabled }}
            - --port
            - {{ .Values.hermes.dashboard.port | quote }}
            - --no-open
            {{- if not .Values.hermes.dashboard.proxy.enabled }}
            - --insecure
            {{- end }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.hermes.dashboard.port }}
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: HOME
              value: /opt/data
            - name: TZ
              value: {{ .Values.hermes.config.timezone | quote }}
            - name: PATH
              value: "/opt/tools:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: KUBECONFIG
              value: /opt/data/home/.kube/config
            - name: HERMES_TUI_DIR
              value: {{ .Values.hermes.dashboard.tuiDir | quote }}
            - name: HERMES_DASHBOARD_TUI
              value: {{ ternary "1" "0" .Values.hermes.dashboard.embeddedChat | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.hermes.secrets.apiKeysName }}
                optional: {{ .Values.hermes.secrets.apiKeysOptional }}
          resources:
            {{- toYaml .Values.hermes.dashboardResources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: tools-bin
              mountPath: /opt/tools
            - name: tmp
              mountPath: /tmp
            - name: kubeconfig
              mountPath: /opt/data/home/.kube
              readOnly: true
            - name: ssh-keys
              mountPath: /opt/data/home/.ssh
              readOnly: true

        {{- if .Values.hermes.dashboard.proxy.enabled }}
        - name: dashboard-proxy
          image: {{ .Values.hermes.dashboard.proxy.image }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cat > /tmp/nginx.conf <<'EOF'
              pid /tmp/nginx.pid;
              events {}
              http {
                access_log /dev/stdout;
                error_log /dev/stderr notice;
                client_body_temp_path /tmp/client_temp;
                proxy_temp_path /tmp/proxy_temp;
                fastcgi_temp_path /tmp/fastcgi_temp;
                uwsgi_temp_path /tmp/uwsgi_temp;
                scgi_temp_path /tmp/scgi_temp;

                map $http_upgrade $connection_upgrade {
                  default upgrade;
                  '' close;
                }

                server {
                  listen {{ .Values.hermes.dashboard.proxy.port }};

                  location / {
                    proxy_pass http://127.0.0.1:{{ .Values.hermes.dashboard.port }};
                    proxy_http_version 1.1;
                    proxy_set_header Host 127.0.0.1:{{ .Values.hermes.dashboard.port }};
                    proxy_set_header X-Forwarded-For 127.0.0.1;
                    proxy_set_header X-Real-IP 127.0.0.1;
                    proxy_set_header X-Forwarded-Host 127.0.0.1:{{ .Values.hermes.dashboard.port }};
                    proxy_set_header Forwarded "";
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection $connection_upgrade;
                    proxy_read_timeout 3600s;
                    proxy_send_timeout 3600s;
                    proxy_buffering off;
                    proxy_request_buffering off;
                  }
                }
              }
              EOF
              nginx -c /tmp/nginx.conf -g 'daemon off;'
          ports:
            - name: dashboard-proxy
              containerPort: {{ .Values.hermes.dashboard.proxy.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/status
              port: dashboard-proxy
            failureThreshold: 6
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/status
              port: dashboard-proxy
            failureThreshold: 6
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.hermes.dashboardProxyResources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 10000
            runAsGroup: 10000
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.hermes.name }}-data
        - name: config
          configMap:
            name: {{ .Values.hermes.name }}-config
            defaultMode: 0755
        - name: tools-bin
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.hermes.secrets.kubeconfigName }}
            optional: {{ .Values.hermes.secrets.kubeconfigOptional }}
            defaultMode: 0600
        - name: ssh-keys
          secret:
            secretName: {{ .Values.hermes.secrets.sshName }}
            optional: {{ .Values.hermes.secrets.sshOptional }}
            defaultMode: 0600
{{- end }}
