openclaw:
  name: openclaw

  image:
    repository: ghcr.io/openclaw/openclaw
    tag: "2026.4.29"
    pullPolicy: IfNotPresent

  apiKeysSecret: openclaw-api-keys
  gatewayTokenSecret: openclaw-gateway-token

  gatewayProxy:
    image: "nginx:1.27-alpine"

  otelCollector:
    image: "otel/opentelemetry-collector:0.120.0"

  initContainers:
    uvImage: "ghcr.io/astral-sh/uv:0.6-bookworm-slim"

  config:
    skills:
      # Block bundled skills at selection time and also mark every built-in
      # skill disabled so the Control UI toggles default to off.
      allowBundled:
        - "k8s-status"
      entries:
        "k8s-status":
          enabled: true
        "browser-automation":
          enabled: false
        "homelab-ssh":
          enabled: false
        "qqbot-channel":
          enabled: false
        "qqbot-media":
          enabled: false
        "qqbot-remind":
          enabled: false
        "1password":
          enabled: false
        "apple-notes":
          enabled: false
        "apple-reminders":
          enabled: false
        "bear-notes":
          enabled: false
        "blogwatcher":
          enabled: false
        "blucli":
          enabled: false
        "bluebubbles":
          enabled: false
        "camsnap":
          enabled: false
        "clawhub":
          enabled: false
        "coding-agent":
          enabled: false
        "discord":
          enabled: false
        "eightctl":
          enabled: false
        "gemini":
          enabled: false
        "gh-issues":
          enabled: false
        "gifgrep":
          enabled: false
        "github":
          enabled: false
        "gog":
          enabled: false
        "goplaces":
          enabled: false
        "healthcheck":
          enabled: false
        "himalaya":
          enabled: false
        "imsg":
          enabled: false
        "mcporter":
          enabled: false
        "model-usage":
          enabled: false
        "nano-pdf":
          enabled: false
        "node-connect":
          enabled: false
        "notion":
          enabled: false
        "obsidian":
          enabled: false
        "openai-whisper":
          enabled: false
        "openai-whisper-api":
          enabled: false
        "openhue":
          enabled: false
        "oracle":
          enabled: false
        "ordercli":
          enabled: false
        "peekaboo":
          enabled: false
        "sag":
          enabled: false
        "session-logs":
          enabled: false
        "sherpa-onnx-tts":
          enabled: false
        "skill-creator":
          enabled: false
        "slack":
          enabled: false
        "songsee":
          enabled: false
        "sonoscli":
          enabled: false
        "spotify-player":
          enabled: false
        "summarize":
          enabled: false
        "taskflow":
          enabled: false
        "taskflow-inbox-triage":
          enabled: false
        "things-mac":
          enabled: false
        "tmux":
          enabled: false
        "trello":
          enabled: false
        "video-frames":
          enabled: false
        "voice-call":
          enabled: false
        "wacli":
          enabled: false
        "weather":
          enabled: false
        "xurl":
          enabled: false
    plugins:
      # Keep the OpenClaw runtime intentionally small. OpenClaw enables many
      # bundled plugins/providers by default, so explicitly deny everything we
      # do not need for Nova + Kubernetes work.
      entries:
        acpx:
          enabled: true
        diagnostics-otel:
          enabled: true
        fireworks:
          enabled: true
        alibaba:
          enabled: false
        amazon-bedrock:
          enabled: false
        amazon-bedrock-mantle:
          enabled: false
        anthropic:
          enabled: false
        anthropic-vertex:
          enabled: false
        arcee:
          enabled: false
        azure-speech:
          enabled: false
        bonjour:
          enabled: false
        browser:
          enabled: false
        byteplus:
          enabled: false
        cerebras:
          enabled: false
        chutes:
          enabled: false
        cloudflare-ai-gateway:
          enabled: false
        comfy:
          enabled: false
        copilot-proxy:
          enabled: false
        deepgram:
          enabled: false
        deepinfra:
          enabled: false
        deepseek:
          enabled: false
        device-pair:
          enabled: false
        document-extract:
          enabled: false
        elevenlabs:
          enabled: false
        fal:
          enabled: false
        file-transfer:
          enabled: false
        github-copilot:
          enabled: false
        google:
          enabled: false
        groq:
          enabled: false
        huggingface:
          enabled: false
        inworld:
          enabled: false
        kilocode:
          enabled: false
        kimi:
          enabled: false
        litellm:
          enabled: false
        lmstudio:
          enabled: false
        memory-core:
          enabled: false
        microsoft:
          enabled: false
        microsoft-foundry:
          enabled: false
        minimax:
          enabled: false
        mistral:
          enabled: false
        moonshot:
          enabled: false
        nvidia:
          enabled: false
        ollama:
          enabled: false
        openai:
          enabled: false
        opencode:
          enabled: false
        opencode-go:
          enabled: false
        openrouter:
          enabled: false
        phone-control:
          enabled: false
        qianfan:
          enabled: false
        qqbot:
          enabled: false
        qwen:
          enabled: false
        runway:
          enabled: false
        senseaudio:
          enabled: false
        sglang:
          enabled: false
        stepfun:
          enabled: false
        synthetic:
          enabled: false
        talk-voice:
          enabled: false
        telegram:
          enabled: false
        tencent:
          enabled: false
        together:
          enabled: false
        tts-local-cli:
          enabled: false
        venice:
          enabled: false
        vercel-ai-gateway:
          enabled: false
        vllm:
          enabled: false
        volcengine:
          enabled: false
        voyage:
          enabled: false
        vydra:
          enabled: false
        web-readability:
          enabled: false
        xai:
          enabled: false
        xiaomi:
          enabled: false
        zai:
          enabled: false
    agents:
      defaults:
        model:
          primary: "fireworks/accounts/fireworks/routers/kimi-k2p6-turbo"
          fallbacks:
            - "fireworks/accounts/fireworks/models/kimi-k2p6"
            - "fireworks/accounts/fireworks/models/deepseek-v4-pro"
            - "fireworks/accounts/fireworks/models/glm-5p1"
            - "fireworks/accounts/fireworks/models/minimax-m2p7"
        models:
          "fireworks/accounts/fireworks/routers/kimi-k2p6-turbo":
            alias: "Kimi K2.6 Turbo"
          "fireworks/accounts/fireworks/models/kimi-k2p6":
            alias: "Kimi K2.6"
          "fireworks/accounts/fireworks/models/deepseek-v4-pro":
            alias: "DeepSeek V4 Pro"
          "fireworks/accounts/fireworks/models/glm-5p1":
            alias: "GLM 5.1"
          "fireworks/accounts/fireworks/models/minimax-m2p7":
            alias: "MiniMax M2.7"
        userTimezone: "America/New_York"
        subagents:
          maxSpawnDepth: 2
          maxChildrenPerAgent: 2
          maxConcurrent: 3
          runTimeoutSeconds: 900
          archiveAfterMinutes: 60
      list:
        # === Nova - The Commander ===
        - id: "main"
          default: true
          name: "Nova"
          workspace: "~/.openclaw/workspace"
          model: "fireworks/accounts/fireworks/routers/kimi-k2p6-turbo"
          tools:
            profile: "full"
          subagents:
            allowAgents:
              - "bolt"
              - "architect"
              - "scout"
              - "scribe"
              - "forge"
              - "ticker"
              - "sentinel"
              - "herald"
              - "wraith"
          sandbox:
            mode: "off"

        # === Bolt - The Operator ===
        - id: "bolt"
          name: "Bolt"
          workspace: "~/.openclaw/workspaces/bolt"
          model: "fireworks/accounts/fireworks/models/deepseek-v4-pro"
          tools:
            profile: "full"
            allow:
              - "group:web"
          sandbox:
            mode: "off"

        # === Architect - The Builder ===
        - id: "architect"
          name: "Architect"
          workspace: "~/.openclaw/workspaces/architect"
          model: "fireworks/accounts/fireworks/routers/kimi-k2p6-turbo"
          tools:
            profile: "full"
            allow:
              - "group:web"
          subagents:
            allowAgents:
              - "bolt"
          sandbox:
            mode: "off"

        # === Scout - The Researcher ===
        - id: "scout"
          name: "Scout"
          workspace: "~/.openclaw/workspaces/scout"
          model: "fireworks/accounts/fireworks/models/minimax-m2p7"
          tools:
            profile: "full"
            allow:
              - "group:web"
              - "group:fs"
              - "group:memory"
              - "group:sessions"
          sandbox:
            mode: "off"

        # === Sentinel - The Guardian ===
        - id: "sentinel"
          name: "Sentinel"
          workspace: "~/.openclaw/workspaces/sentinel"
          model: "fireworks/accounts/fireworks/models/glm-5p1"
          tools:
            profile: "full"
          sandbox:
            mode: "off"

        # === Scribe - The Documentarian ===
        - id: "scribe"
          name: "Scribe"
          workspace: "~/.openclaw/workspaces/scribe"
          model: "fireworks/accounts/fireworks/models/glm-5p1"
          tools:
            profile: "full"
            allow:
              - "group:fs"
              - "group:web"
              - "group:memory"
          sandbox:
            mode: "off"

        # === Forge - The Platform Smith ===
        - id: "forge"
          name: "Forge"
          workspace: "~/.openclaw/workspaces/forge"
          model: "fireworks/accounts/fireworks/routers/kimi-k2p6-turbo"
          tools:
            profile: "full"
            allow:
              - "group:web"
          subagents:
            allowAgents:
              - "bolt"
          sandbox:
            mode: "off"

        # === Ticker - The Quant ===
        - id: "ticker"
          name: "Ticker"
          workspace: "~/.openclaw/workspaces/ticker"
          model: "fireworks/accounts/fireworks/models/deepseek-v4-pro"
          tools:
            profile: "full"
            allow:
              - "group:web"
          sandbox:
            mode: "off"

        # === Herald - The Briefer ===
        - id: "herald"
          name: "Herald"
          workspace: "~/.openclaw/workspaces/herald"
          model: "fireworks/accounts/fireworks/models/minimax-m2p7"
          tools:
            profile: "full"
            allow:
              - "group:web"
              - "group:fs"
              - "group:memory"
              - "group:sessions"
          sandbox:
            mode: "off"

        # === Wraith - The Automator ===
        - id: "wraith"
          name: "Wraith"
          workspace: "~/.openclaw/workspaces/wraith"
          model: "fireworks/accounts/fireworks/models/deepseek-v4-pro"
          tools:
            profile: "full"
          sandbox:
            mode: "off"

    tools:
      exec:
        ask: "off"
      subagents:
        tools:
          allow:
            - "group:fs"
            - "group:runtime"
            - "group:web"
            - "group:memory"
            - "group:sessions"
            - "group:ui"
            - "group:messaging"
            - "group:automation"
            - "group:nodes"
            - "group:agents"
            - "group:media"
    approvals:
      exec:
        enabled: false
    cron:
      enabled: false
      maxConcurrentRuns: 2
      sessionRetention: "24h"
      retry:
        maxAttempts: 2
        retryOn:
          - "rate_limit"
          - "overloaded"
          - "network"
          - "server_error"
    channels:
      telegram:
        enabled: false
        botToken: "${TELEGRAM_BOT_TOKEN}"
        execApprovals:
          enabled: false
        dmPolicy: "allowlist"
        allowFrom:
          - "8635782483"
        groupPolicy: "disabled"
        streaming: "partial"
    session:
      scope: "per-sender"
    gateway:
      trustedProxies:
        - "10.42.0.0/16"
        - "127.0.0.0/8"
        - "::1/128"
      controlUi:
        allowedOrigins:
          - "https://openclaw.lucas.engineering"
    models:
      providers:
        fireworks:
          baseUrl: "https://api.fireworks.ai/inference/v1"
          apiKey: "${FIREWORKS_API_KEY}"
          api: "openai-completions"
          models:
            - id: "accounts/fireworks/routers/kimi-k2p6-turbo"
              name: "Kimi K2.6 Turbo"
              reasoning: true
              input:
                - "text"
                - "image"
              contextWindow: 262144
              maxTokens: 8192
            - id: "accounts/fireworks/models/kimi-k2p6"
              name: "Kimi K2.6"
              reasoning: true
              input:
                - "text"
                - "image"
              contextWindow: 262144
              maxTokens: 8192
            - id: "accounts/fireworks/models/deepseek-v4-pro"
              name: "DeepSeek V4 Pro"
              reasoning: true
              input:
                - "text"
              contextWindow: 1048576
              maxTokens: 8192
            - id: "accounts/fireworks/models/glm-5p1"
              name: "GLM 5.1"
              reasoning: false
              input:
                - "text"
              contextWindow: 202752
              maxTokens: 8192
            - id: "accounts/fireworks/models/minimax-m2p7"
              name: "MiniMax M2.7"
              reasoning: false
              input:
                - "text"
                - "image"
              contextWindow: 196608
              maxTokens: 8192

  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "6000m"
      memory: "8Gi"

  storage:
    size: 10Gi
    storageClass: local-path

  ingress:
    enabled: true
    className: nginx
    host: openclaw.lucas.engineering
    clusterIssuer: letsencrypt-prod
    tls:
      secretName: openclaw-lucas-engineering-tls

  networkPolicy:
    enabled: true
