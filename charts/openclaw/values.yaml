openclaw:
  name: openclaw

  image:
    repository: ghcr.io/openclaw/openclaw
    tag: "2026.2.3"
    pullPolicy: IfNotPresent

  apiKeysSecret: openclaw-api-keys

  config:
    agents:
      defaults:
        model:
          primary: "fireworks/accounts/fireworks/models/llama-v3p3-70b-instruct"
          fallbacks:
            - "fireworks/accounts/fireworks/models/kimi-k2.5"
        models:
          "fireworks/accounts/fireworks/models/llama-v3p3-70b-instruct":
            alias: "Llama 70B"
          "fireworks/accounts/fireworks/models/kimi-k2.5":
            alias: "Kimi K2.5"
    session:
      scope: "per-sender"
    gateway:
      trustedProxies:
        - "10.42.0.0/16"
        - "::1/128"
    models:
      providers:
        fireworks:
          baseUrl: "https://api.fireworks.ai/inference/v1"
          apiKey: "${FIREWORKS_API_KEY}"
          api: "openai-completions"
          models:
            - id: "accounts/fireworks/models/llama-v3p3-70b-instruct"
              name: "Llama 3.3 70B Instruct"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192
            - id: "accounts/fireworks/models/kimi-k2.5"
              name: "Kimi K2.5"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "6000m"
      memory: "8Gi"

  storage:
    size: 10Gi
    storageClass: local-path

  chromium:
    enabled: false
    persistence:
      size: "1Gi"

  ollama:
    enabled: false
    models: []
    gpu: 0
    storage:
      sizeLimit: 30Gi

  ingress:
    enabled: true
    className: nginx
    host: openclaw.lucas.engineering

  networkPolicy:
    enabled: true
