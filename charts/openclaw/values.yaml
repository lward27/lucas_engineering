openclaw:
  name: openclaw

  image:
    repository: ghcr.io/openclaw/openclaw
    tag: "2026.2.3"
    pullPolicy: IfNotPresent

  # Optional: API keys secret for cloud providers (Anthropic, OpenAI, etc.)
  # Not needed when using Ollama local models only.
  # To enable, create the secret and uncomment:
  #   kubectl create secret generic openclaw-api-keys \
  #     --namespace apps-prod \
  #     --from-literal=ANTHROPIC_API_KEY=<key> \
  #     --from-literal=OPENAI_API_KEY=<key>
  # apiKeysSecret: openclaw-api-keys

  # Agent configuration
  # Model provider will be configured once external Ollama VM is set up.
  # To configure, update config.models.providers and config.agents.defaults.model.primary
  config:
    session:
      scope: "per-sender"
    gateway:
      trustedProxies:
        - "10.42.0.0/16"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "6000m"
      memory: "8Gi"

  storage:
    size: 10Gi
    storageClass: local-path

  chromium:
    enabled: false
    persistence:
      size: "1Gi"

  ollama:
    enabled: false
    models: []
    gpu: 0
    storage:
      sizeLimit: 30Gi

  ingress:
    enabled: true
    className: nginx
    host: openclaw.lucas.engineering

  networkPolicy:
    enabled: true
    allowedIngressNamespaces:
      - ingress-nginx
