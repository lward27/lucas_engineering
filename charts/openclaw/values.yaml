openclaw:
  name: openclaw

  image:
    repository: ghcr.io/openclaw/openclaw
    tag: "2026.3.31"
    pullPolicy: IfNotPresent

  apiKeysSecret: openclaw-api-keys
  gatewayTokenSecret: openclaw-gateway-token

  gatewayProxy:
    image: "nginx:1.27-alpine"

  otelCollector:
    image: "otel/opentelemetry-collector:0.120.0"

  initContainers:
    uvImage: "ghcr.io/astral-sh/uv:0.6-bookworm-slim"

  config:
    agents:
      defaults:
        model:
          primary: "fireworks/accounts/fireworks/routers/kimi-k2p5-turbo"
          fallbacks:
            - "fireworks/accounts/fireworks/models/deepseek-v3p2"
        models:
          "fireworks/accounts/fireworks/routers/kimi-k2p5-turbo":
            alias: "Kimi K2.5"
          "fireworks/accounts/fireworks/models/deepseek-v3p2":
            alias: "DeepSeek V3"
          "fireworks/accounts/fireworks/models/glm-4p7":
            alias: "GLM 4.7"
          "fireworks/accounts/fireworks/models/qwen3p6-plus":
            alias: "Qwen 3.6 Plus"
        userTimezone: "America/New_York"
        subagents:
          maxSpawnDepth: 2
          maxChildrenPerAgent: 5
          maxConcurrent: 8
          runTimeoutSeconds: 900
          archiveAfterMinutes: 60
      list:
        # === Nova - The Commander ===
        - id: "main"
          default: true
          name: "Nova"
          workspace: "~/.openclaw/workspace"
          tools:
            profile: "full"
          subagents:
            allowAgents:
              - "bolt"
              - "architect"
              - "scout"
              - "scribe"
              - "forge"
              - "ticker"
              - "sentinel"
              - "herald"
              - "wraith"
          sandbox:
            mode: "off"

        # === Bolt - The Operator ===
        - id: "bolt"
          name: "Bolt"
          workspace: "~/.openclaw/workspaces/bolt"
          model: "fireworks/accounts/fireworks/models/deepseek-v3p2"
          tools:
            profile: "coding"
            allow:
              - "group:web"
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
          sandbox:
            mode: "off"

        # === Architect - The Builder ===
        - id: "architect"
          name: "Architect"
          workspace: "~/.openclaw/workspaces/architect"
          model: "fireworks/accounts/fireworks/models/qwen3p6-plus"
          tools:
            profile: "coding"
            allow:
              - "group:web"
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
          subagents:
            allowAgents:
              - "bolt"
          sandbox:
            mode: "off"

        # === Scout - The Researcher ===
        - id: "scout"
          name: "Scout"
          workspace: "~/.openclaw/workspaces/scout"
          tools:
            allow:
              - "group:web"
              - "group:fs"
              - "group:memory"
              - "group:sessions"
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
            deny:
              - "exec"
              - "process"
          sandbox:
            mode: "off"

        # === Sentinel - The Guardian ===
        - id: "sentinel"
          name: "Sentinel"
          workspace: "~/.openclaw/workspaces/sentinel"
          model: "fireworks/accounts/fireworks/models/deepseek-v3p2"
          tools:
            profile: "coding"
            allow:
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
            deny:
              - "gateway"
              - "cron"
          sandbox:
            mode: "off"

        # === Scribe - The Documentarian ===
        - id: "scribe"
          name: "Scribe"
          workspace: "~/.openclaw/workspaces/scribe"
          model: "fireworks/accounts/fireworks/models/glm-4p7"
          tools:
            allow:
              - "group:fs"
              - "group:web"
              - "group:memory"
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
            deny:
              - "exec"
              - "process"
          sandbox:
            mode: "off"

        # === Forge - The Platform Smith ===
        - id: "forge"
          name: "Forge"
          workspace: "~/.openclaw/workspaces/forge"
          model: "fireworks/accounts/fireworks/models/qwen3p6-plus"
          tools:
            profile: "coding"
            allow:
              - "group:web"
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
          subagents:
            allowAgents:
              - "bolt"
          sandbox:
            mode: "off"

        # === Ticker - The Quant ===
        - id: "ticker"
          name: "Ticker"
          workspace: "~/.openclaw/workspaces/ticker"
          model: "fireworks/accounts/fireworks/models/deepseek-v3p2"
          tools:
            profile: "coding"
            allow:
              - "group:web"
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
          sandbox:
            mode: "off"

        # === Herald - The Briefer ===
        - id: "herald"
          name: "Herald"
          workspace: "~/.openclaw/workspaces/herald"
          model: "fireworks/accounts/fireworks/models/glm-4p7"
          tools:
            allow:
              - "group:web"
              - "group:fs"
              - "group:memory"
              - "group:sessions"
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
            deny:
              - "exec"
              - "process"
          sandbox:
            mode: "off"

        # === Wraith - The Automator ===
        - id: "wraith"
          name: "Wraith"
          workspace: "~/.openclaw/workspaces/wraith"
          model: "fireworks/accounts/fireworks/models/deepseek-v3p2"
          tools:
            profile: "coding"
            allow:
              - "mcp__rag__rag_search"
              - "mcp__rag__rag_search_all"
              - "mcp__rag__rag_index"
              - "mcp__rag__rag_status"
          sandbox:
            mode: "off"

    tools:
      exec:
        ask: "off"
    approvals:
      exec:
        enabled: false
    mcp:
      servers:
        rag:
          command: "/home/openclaw/.openclaw/mcp-servers/rag/.venv/bin/python"
          args:
            - "/home/openclaw/.openclaw/mcp-servers/rag/server.py"
          env:
            RAG_API_URL: "http://rag-service.apps-prod.svc.cluster.local:8000"
            RAG_API_TOKEN: "${RAG_API_TOKEN}"
    cron:
      enabled: true
      maxConcurrentRuns: 2
      sessionRetention: "24h"
      retry:
        maxAttempts: 2
        retryOn:
          - "rate_limit"
          - "overloaded"
          - "network"
          - "server_error"
    channels:
      telegram:
        enabled: true
        botToken: "${TELEGRAM_BOT_TOKEN}"
        execApprovals:
          enabled: false
        dmPolicy: "allowlist"
        allowFrom:
          - "8635782483"
        groupPolicy: "disabled"
        streaming: "partial"
    session:
      scope: "per-sender"
    gateway:
      trustedProxies:
        - "10.42.0.0/16"
        - "127.0.0.0/8"
        - "::1/128"
      controlUi:
        allowedOrigins:
          - "https://openclaw.lucas.engineering"
    models:
      providers:
        fireworks:
          baseUrl: "https://api.fireworks.ai/inference/v1"
          apiKey: "${FIREWORKS_API_KEY}"
          api: "openai-completions"
          models:
            - id: "accounts/fireworks/routers/kimi-k2p5-turbo"
              name: "Kimi K2.5"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192
            - id: "accounts/fireworks/models/deepseek-v3p2"
              name: "DeepSeek V3"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192
            - id: "accounts/fireworks/models/glm-4p7"
              name: "GLM 4.7"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192
            - id: "accounts/fireworks/models/qwen3p6-plus"
              name: "Qwen 3.6 Plus"
              reasoning: false
              input:
                - "text"
              contextWindow: 1048576
              maxTokens: 8192

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "6000m"
      memory: "8Gi"

  storage:
    size: 10Gi
    storageClass: local-path

  ingress:
    enabled: true
    className: nginx
    host: openclaw.lucas.engineering
    clusterIssuer: letsencrypt-prod
    tls:
      secretName: openclaw-lucas-engineering-tls

  networkPolicy:
    enabled: true

