openclaw:
  name: openclaw

  image:
    repository: ghcr.io/openclaw/openclaw
    tag: "2026.2.3"
    pullPolicy: IfNotPresent

  apiKeysSecret: openclaw-api-keys

  config:
    agents:
      defaults:
        model:
          primary: "fireworks/accounts/fireworks/models/kimi-k2p5"
          fallbacks:
            - "fireworks/accounts/fireworks/models/deepseek-v3p2"
        models:
          "fireworks/accounts/fireworks/models/kimi-k2p5":
            alias: "Kimi K2.5"
          "fireworks/accounts/fireworks/models/deepseek-v3p2":
            alias: "DeepSeek V3"
          "fireworks/accounts/fireworks/models/glm-4p7":
            alias: "GLM 4.7"
      list:
        - id: "main"
          name: "Main"
        - id: "bobs-burgers"
          name: "Bob's Burgers Expert"
          model: "fireworks/accounts/fireworks/models/glm-4p7"
    session:
      scope: "per-sender"
    gateway:
      trustedProxies:
        - "10.42.0.0/16"
        - "::1/128"
    models:
      providers:
        fireworks:
          baseUrl: "https://api.fireworks.ai/inference/v1"
          apiKey: "${FIREWORKS_API_KEY}"
          api: "openai-completions"
          models:
            - id: "accounts/fireworks/models/kimi-k2p5"
              name: "Kimi K2.5"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192
            - id: "accounts/fireworks/models/deepseek-v3p2"
              name: "DeepSeek V3"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192
            - id: "accounts/fireworks/models/glm-4p7"
              name: "GLM 4.7"
              reasoning: false
              input:
                - "text"
              contextWindow: 131072
              maxTokens: 8192

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "6000m"
      memory: "8Gi"

  storage:
    size: 10Gi
    storageClass: local-path

  chromium:
    enabled: false
    persistence:
      size: "1Gi"

  ollama:
    enabled: false
    models: []
    gpu: 0
    storage:
      sizeLimit: 30Gi

  ingress:
    enabled: true
    className: nginx
    host: openclaw.lucas.engineering
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      enabled: true
      secretName: openclaw-lucas-engineering-tls

  networkPolicy:
    enabled: true
