apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "OpenClaw"
data:
  openclaw-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "LLM API Call Rate",
          "description": "Rate of LLM API calls over time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(http_client_request_duration_seconds_count{service_name=\"openclaw\"}[$__rate_interval])) by (http_request_method, url_path)",
              "legendFormat": "{{ "{{" }}http_request_method{{ "}}" }} {{ "{{" }}url_path{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "stacking": { "mode": "none" }
              },
              "unit": "reqps"
            }
          }
        },
        {
          "title": "LLM API Error Rate",
          "description": "Rate of failed LLM API calls (4xx/5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(http_client_request_duration_seconds_count{service_name=\"openclaw\", http_response_status_code=~\"[45]..\"}[$__rate_interval])) by (http_response_status_code)",
              "legendFormat": "HTTP {{ "{{" }}http_response_status_code{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "stacking": { "mode": "none" }
              },
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            }
          }
        },
        {
          "title": "LLM API Latency (p50 / p95 / p99)",
          "description": "Duration of outbound LLM API calls",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_client_request_duration_seconds_bucket{service_name=\"openclaw\"}[$__rate_interval])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_client_request_duration_seconds_bucket{service_name=\"openclaw\"}[$__rate_interval])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_client_request_duration_seconds_bucket{service_name=\"openclaw\"}[$__rate_interval])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "stacking": { "mode": "none" }
              },
              "unit": "s"
            }
          }
        },
        {
          "title": "Tool Usage Distribution",
          "description": "Which tools OpenClaw uses most frequently",
          "type": "piechart",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "sum by (tool_name) (count_over_time({app=\"openclaw\"} | json | tool_name != \"\" [$__range]))",
              "legendFormat": "{{ "{{" }}tool_name{{ "}}" }}"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] },
            "pieType": "donut",
            "reduceOptions": { "calcs": ["sum"] }
          }
        },
        {
          "title": "Agent Activity",
          "description": "Event count by agent over time",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "sum by (agent) (count_over_time({app=\"openclaw\"} | json | agent != \"\" [$__interval]))",
              "legendFormat": "{{ "{{" }}agent{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "stacking": { "mode": "normal" }
              }
            }
          }
        },
        {
          "title": "Token Usage (Prompt vs Completion)",
          "description": "Token burn rate tracking for cost monitoring",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(llm_prompt_tokens_total{service_name=\"openclaw\"}[$__rate_interval]))",
              "legendFormat": "Prompt Tokens/s"
            },
            {
              "expr": "sum(rate(llm_completion_tokens_total{service_name=\"openclaw\"}[$__rate_interval]))",
              "legendFormat": "Completion Tokens/s"
            },
            {
              "expr": "sum(increase(llm_prompt_tokens_total{service_name=\"openclaw\"}[$__range]))",
              "legendFormat": "Total Prompt Tokens (range)",
              "hide": true
            },
            {
              "expr": "sum(increase(llm_completion_tokens_total{service_name=\"openclaw\"}[$__range]))",
              "legendFormat": "Total Completion Tokens (range)",
              "hide": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "stacking": { "mode": "none" }
              },
              "unit": "short"
            }
          }
        },
        {
          "title": "Recent Tool Executions (Logs + Trace Links)",
          "description": "OpenClaw log stream with trace IDs for jumping to Tempo",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{app=\"openclaw\"} | json",
              "maxLines": 200
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": true,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        },
        {
          "title": "Container Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 44 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"apps-prod\", pod=~\"openclaw.*\", container!=\"\"}",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }} / {{ "{{" }}container{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "stacking": { "mode": "none" }
              },
              "unit": "bytes"
            }
          }
        },
        {
          "title": "Container CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 44 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"apps-prod\", pod=~\"openclaw.*\", container!=\"\"}[$__rate_interval])",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }} / {{ "{{" }}container{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "stacking": { "mode": "none" }
              },
              "unit": "percentunit"
            }
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["openclaw", "ai", "observability"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Prometheus",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": { "selected": false, "text": "Loki", "value": "Loki" },
            "hide": 0,
            "includeAll": false,
            "label": "Loki",
            "multi": false,
            "name": "DS_LOKI",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "America/New_York",
      "title": "OpenClaw Overview",
      "uid": "openclaw-overview",
      "version": 1
    }
