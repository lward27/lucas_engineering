apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-dashboard-instance
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.openclaw.name }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "OpenClaw"
data:
  openclaw-instance.json: |-
    {{ .Files.Get "dashboards/openclaw-instance.json" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-dashboard-custom
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.openclaw.name }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "OpenClaw"
data:
  openclaw-custom.json: |-
    {{ .Files.Get "dashboards/openclaw-custom.json" | nindent 4 }}
