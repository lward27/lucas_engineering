apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.openclaw.name }}
automountServiceAccountToken: false
---
# =============================================================================
# Cluster-wide read-only access (excludes secrets, RBAC resources)
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-reader
rules:
# Core resources - read only
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - services
    - endpoints
    - configmaps
    - namespaces
    - nodes
    - events
    - persistentvolumeclaims
    - persistentvolumes
    - resourcequotas
    - limitranges
    - serviceaccounts
  verbs: ["get", "list", "watch"]
# Apps resources - read only
- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - replicasets
    - daemonsets
  verbs: ["get", "list", "watch"]
# Batch resources - read only
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["get", "list", "watch"]
# Networking - read only
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - ingressclasses
    - networkpolicies
  verbs: ["get", "list", "watch"]
# Storage - read only
- apiGroups: ["storage.k8s.io"]
  resources:
    - storageclasses
  verbs: ["get", "list", "watch"]
# ArgoCD - read only
- apiGroups: ["argoproj.io"]
  resources:
    - applications
    - applicationsets
    - appprojects
  verbs: ["get", "list", "watch"]
# Tekton - read only
- apiGroups: ["tekton.dev"]
  resources:
    - pipelines
    - tasks
    - pipelineruns
    - taskruns
  verbs: ["get", "list", "watch"]
# Metrics server - read only
- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
    - nodes
  verbs: ["get", "list", "watch"]
# cert-manager - read only
- apiGroups: ["cert-manager.io"]
  resources:
    - certificates
    - certificaterequests
    - issuers
    - clusterissuers
  verbs: ["get", "list", "watch"]
# ACME order/challenge visibility for cert troubleshooting
- apiGroups: ["acme.cert-manager.io"]
  resources:
    - challenges
    - orders
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
---
# =============================================================================
# Workload management (write access) - bound per-namespace via RoleBindings
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-workload-manager
rules:
- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - replicasets
  verbs: ["create", "update", "patch", "delete"]
- apiGroups: [""]
  resources:
    - pods
  verbs: ["create", "delete"]
- apiGroups: [""]
  resources:
    - pods/exec
    - pods/log
  verbs: ["create", "get"]
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["create", "update", "patch", "delete"]
---
# Bind workload-manager to apps-prod only
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-workload-manager
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-workload-manager
subjects:
- kind: ServiceAccount
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
---
# Bind workload-manager to code-server (for exec into code-server pods)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-workload-manager
  namespace: code-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-workload-manager
subjects:
- kind: ServiceAccount
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
---
# =============================================================================
# Tekton pipeline management - bound to tekton-pipelines only
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-tekton
rules:
- apiGroups: ["tekton.dev"]
  resources:
    - pipelineruns
    - taskruns
  verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-tekton
  namespace: tekton-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-tekton
subjects:
- kind: ServiceAccount
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
---
# =============================================================================
# Secret read access - apps-prod only
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-secrets-reader
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources:
    - secrets
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-secrets-reader
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openclaw-secrets-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
