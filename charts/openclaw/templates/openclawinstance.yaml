apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
spec:
  image:
    repository: {{ .Values.openclaw.image.repository }}
    tag: {{ .Values.openclaw.image.tag | quote }}
    pullPolicy: {{ .Values.openclaw.image.pullPolicy }}

  {{- if .Values.openclaw.apiKeysSecret }}
  envFrom:
    - secretRef:
        name: {{ .Values.openclaw.apiKeysSecret }}
  {{- end }}

  config:
    raw:
      {{- toYaml .Values.openclaw.config | nindent 6 }}

  env:
    - name: OPENCLAW_DISABLE_BONJOUR
      value: "1"
    - name: PATH
      value: "/opt/tools:/home/openclaw/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

  initContainers:
    - name: install-kubectl
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          cp /opt/bitnami/kubectl/bin/kubectl /tools/kubectl
          chmod +x /tools/kubectl
          echo "kubectl installed"
      volumeMounts:
        - name: tools-bin
          mountPath: /tools

  extraVolumes:
    - name: tools-bin
      emptyDir: {}
    - name: ssh-keys
      secret:
        secretName: openclaw-ssh
        defaultMode: 0600

  extraVolumeMounts:
    - name: tools-bin
      mountPath: /opt/tools
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/id_ed25519
      subPath: id_ed25519
      readOnly: true
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/id_ed25519.pub
      subPath: id_ed25519.pub
      readOnly: true
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/known_hosts
      subPath: known_hosts
      readOnly: true
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/config
      subPath: config
      readOnly: true

  resources:
    {{- toYaml .Values.openclaw.resources | nindent 4 }}

  security:
    podSecurityContext:
      fsGroup: 1000
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    networkPolicy:
      enabled: false
    rbac:
      createServiceAccount: true

  storage:
    persistence:
      enabled: true
      storageClass: {{ .Values.openclaw.storage.storageClass }}
      size: {{ .Values.openclaw.storage.size }}
      accessModes:
        - ReadWriteOnce

  chromium:
    enabled: {{ .Values.openclaw.chromium.enabled }}
    image:
      repository: chromedp/headless-shell
      tag: "stable"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    persistence:
      enabled: true
      size: {{ .Values.openclaw.chromium.persistence.size | quote }}

  ollama:
    enabled: {{ .Values.openclaw.ollama.enabled }}
    models:
      {{- toYaml .Values.openclaw.ollama.models | nindent 6 }}
    gpu: {{ .Values.openclaw.ollama.gpu }}
    storage:
      sizeLimit: {{ .Values.openclaw.ollama.storage.sizeLimit }}

  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: false
      security:
        forceHTTPS: false
        enableHSTS: false

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      enabled: true
      periodSeconds: 5
      failureThreshold: 60

  observability:
    logging:
      level: info
      format: json
