apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
spec:
  image:
    repository: {{ .Values.openclaw.image.repository }}
    tag: {{ .Values.openclaw.image.tag | quote }}
    pullPolicy: {{ .Values.openclaw.image.pullPolicy }}

  {{- if .Values.openclaw.apiKeysSecret }}
  envFrom:
    - secretRef:
        name: {{ .Values.openclaw.apiKeysSecret }}
  {{- end }}

  config:
    raw:
      {{- toYaml .Values.openclaw.config | nindent 6 }}

  env:
    - name: OPENCLAW_DISABLE_BONJOUR
      value: "1"
    - name: PATH
      value: "/opt/tools:/home/openclaw/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    - name: KUBECONFIG
      value: "/home/openclaw/.kube/config"
    {{- if .Values.openclaw.observability.tracing.enabled }}
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: {{ .Values.openclaw.observability.tracing.endpoint | quote }}
    - name: OTEL_TRACES_EXPORTER
      value: "otlp"
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "service.name={{ .Values.openclaw.name }},service.namespace={{ .Release.Namespace }}"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    {{- end }}
    {{- if .Values.openclaw.observability.metrics.enabled }}
    - name: OTEL_METRICS_EXPORTER
      value: "otlp"
    - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
      value: {{ .Values.openclaw.observability.metrics.endpoint | quote }}
    - name: OTEL_EXPORTER_OTLP_METRICS_PROTOCOL
      value: "http/protobuf"
    {{- end }}

  initContainers:
    - name: install-kubectl
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          cp /opt/bitnami/kubectl/bin/kubectl /tools/kubectl
          chmod +x /tools/kubectl
          echo "kubectl installed"
      volumeMounts:
        - name: tools-bin
          mountPath: /tools
    - name: init-workspaces
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          set -e
          WS=/data/workspaces
          INIT=/agent-workspace-init
          AGENTS="bolt architect scout sentinel scribe forge ticker herald wraith"

          for agent in $AGENTS; do
            dir="$WS/$agent"
            mkdir -p "$dir"

            # Copy agent-specific files (only if they don't exist — preserve agent edits)
            for suffix in soul identity agents; do
              key="${agent}-${suffix}-md"
              target_name="$(echo $suffix | tr '[:lower:]' '[:upper:]').md"
              src="$INIT/$key"
              dst="$dir/$target_name"
              if [ -f "$src" ] && [ ! -f "$dst" ]; then
                cp "$src" "$dst"
                echo "  copied $target_name"
              fi
            done

            # Copy shared files (only if they don't exist)
            for shared in shared-user-md:USER.md shared-environment-md:ENVIRONMENT.md; do
              key="${shared%%:*}"
              fname="${shared#*:}"
              src="$INIT/$key"
              dst="$dir/$fname"
              if [ -f "$src" ] && [ ! -f "$dst" ]; then
                cp "$src" "$dst"
                echo "  copied $fname"
              fi
            done

            # Create memory directory
            mkdir -p "$dir/memory"
            echo "[$agent] workspace ready"
          done
          echo "All workspaces initialized"
      volumeMounts:
        - name: data
          mountPath: /data
        - name: agent-workspace-init
          mountPath: /agent-workspace-init

  extraVolumes:
    - name: tools-bin
      emptyDir: {}
    - name: agent-workspace-init
      configMap:
        name: openclaw-agent-workspace-init
    - name: ssh-keys
      secret:
        secretName: openclaw-ssh
        defaultMode: 0600
    - name: kubeconfig
      secret:
        secretName: openclaw-kubeconfig
        defaultMode: 0600

  extraVolumeMounts:
    - name: tools-bin
      mountPath: /opt/tools
    - name: kubeconfig
      mountPath: /home/openclaw/.kube/config
      subPath: config
      readOnly: true
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/id_ed25519
      subPath: id_ed25519
      readOnly: true
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/id_ed25519.pub
      subPath: id_ed25519.pub
      readOnly: true
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/known_hosts
      subPath: known_hosts
      readOnly: true
    - name: ssh-keys
      mountPath: /home/openclaw/.ssh/config
      subPath: config
      readOnly: true

  resources:
    {{- toYaml .Values.openclaw.resources | nindent 4 }}

  security:
    podSecurityContext:
      fsGroup: 1000
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    networkPolicy:
      enabled: false
    rbac:
      createServiceAccount: true

  storage:
    persistence:
      enabled: true
      storageClass: {{ .Values.openclaw.storage.storageClass }}
      size: {{ .Values.openclaw.storage.size }}
      accessModes:
        - ReadWriteOnce

  chromium:
    enabled: {{ .Values.openclaw.chromium.enabled }}
    image:
      repository: chromedp/headless-shell
      tag: "stable"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    persistence:
      enabled: true
      size: {{ .Values.openclaw.chromium.persistence.size | quote }}

  ollama:
    enabled: {{ .Values.openclaw.ollama.enabled }}
    models:
      {{- toYaml .Values.openclaw.ollama.models | nindent 6 }}
    gpu: {{ .Values.openclaw.ollama.gpu }}
    storage:
      sizeLimit: {{ .Values.openclaw.ollama.storage.sizeLimit }}

  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: {{ .Values.openclaw.ingress.enabled }}
      className: {{ .Values.openclaw.ingress.className }}
      annotations:
        cert-manager.io/cluster-issuer: {{ .Values.openclaw.ingress.clusterIssuer }}
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-buffering: "off"
        nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
      hosts:
        - host: {{ .Values.openclaw.ingress.host }}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - {{ .Values.openclaw.ingress.host }}
          secretName: {{ .Values.openclaw.ingress.tls.secretName }}
      security:
        forceHTTPS: false
        enableHSTS: false

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
    startup:
      enabled: true
      periodSeconds: 5
      failureThreshold: 60

  observability:
    logging:
      level: info
      format: json
