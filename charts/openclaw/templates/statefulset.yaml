apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.openclaw.name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  serviceName: {{ .Values.openclaw.name }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.openclaw.name }}
      app.kubernetes.io/instance: {{ .Values.openclaw.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.openclaw.name }}
        app.kubernetes.io/instance: {{ .Values.openclaw.name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.openclaw.name }}
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        # 1. Copy config files to PVC
        - name: init-config
          image: busybox:1.37
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.apiKeysSecret }}
                  key: TELEGRAM_BOT_TOKEN
            - name: FIREWORKS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.apiKeysSecret }}
                  key: FIREWORKS_API_KEY
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.gatewayTokenSecret }}
                  key: token
            - name: RAG_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rag-service-secrets
                  key: api-token
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /data/openclaw.json
              rm -f /data/openclaw.json.bak
              sed -i "s|\${TELEGRAM_BOT_TOKEN}|$TELEGRAM_BOT_TOKEN|g" /data/openclaw.json
              sed -i "s|\${FIREWORKS_API_KEY}|$FIREWORKS_API_KEY|g" /data/openclaw.json
              sed -i "s|\${OPENCLAW_GATEWAY_TOKEN}|$OPENCLAW_GATEWAY_TOKEN|g" /data/openclaw.json
              sed -i "s|\${RAG_API_TOKEN}|$RAG_API_TOKEN|g" /data/openclaw.json
              mkdir -p /data/workspace
              [ -f /data/workspace/BOOTSTRAP.md ] || cp /workspace-init/BOOTSTRAP.md /data/workspace/BOOTSTRAP.md
              [ -f /data/workspace/ENVIRONMENT.md ] || cp /workspace-init/ENVIRONMENT.md /data/workspace/ENVIRONMENT.md
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: workspace-init
              mountPath: /workspace-init
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        # 2. Install uv package manager
        - name: init-uv
          image: {{ .Values.openclaw.initContainers.uvImage }}
          command:
            - sh
            - -c
            - |
              set -e
              if [ -x /home/openclaw/.local/bin/uv ]; then echo "uv already installed"; exit 0; fi
              mkdir -p /home/openclaw/.local/bin
              cp /usr/local/bin/uv /home/openclaw/.local/bin/uv
              echo "uv $(/home/openclaw/.local/bin/uv --version) installed"
          volumeMounts:
            - name: data
              mountPath: /home/openclaw/.local
              subPath: .local
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        # 3. Ensure pip is available
        - name: init-pip
          image: {{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}
          command:
            - sh
            - -c
            - |
              python3 -m ensurepip --upgrade --user 2>/dev/null || echo "ensurepip unavailable, skipping"
          env:
            - name: HOME
              value: /home/openclaw
          volumeMounts:
            - name: data
              mountPath: /home/openclaw/.local
              subPath: .local
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        # 4. Install kubectl
        - name: install-kubectl
          image: bitnami/kubectl:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              cp /opt/bitnami/kubectl/bin/kubectl /tools/kubectl
              chmod +x /tools/kubectl
              echo "kubectl installed"
          volumeMounts:
            - name: tools-bin
              mountPath: /tools
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        # 5. Initialize agent workspaces (bootstrap-only, never overwrites)
        - name: init-workspaces
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              set -e
              WS=/data/workspaces
              INIT=/agent-workspace-init
              AGENTS="bolt architect scout sentinel scribe forge ticker herald wraith"

              for agent in $AGENTS; do
                dir="$WS/$agent"
                mkdir -p "$dir"

                # Copy agent-specific files (only if they don't exist — preserve agent edits)
                for suffix in soul identity agents; do
                  key="${agent}-${suffix}-md"
                  target_name="$(echo $suffix | tr '[:lower:]' '[:upper:]').md"
                  src="$INIT/$key"
                  dst="$dir/$target_name"
                  if [ -f "$src" ] && [ ! -f "$dst" ]; then
                    cp "$src" "$dst"
                    echo "  [$agent] copied $target_name"
                  fi
                done

                # Copy shared files (only if they don't exist)
                for shared in shared-user-md:USER.md shared-environment-md:ENVIRONMENT.md shared-tools-rag-md:TOOLS_RAG.md; do
                  key="${shared%%:*}"
                  fname="${shared#*:}"
                  src="$INIT/$key"
                  dst="$dir/$fname"
                  if [ -f "$src" ] && [ ! -f "$dst" ]; then
                    cp "$src" "$dst"
                    echo "  [$agent] copied $fname"
                  fi
                done

                mkdir -p "$dir/memory"
              done

              echo "All workspaces initialized"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: agent-workspace-init
              mountPath: /agent-workspace-init
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        # 6. Install gh CLI + configure git
        - name: init-git
          image: {{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}
          env:
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.apiKeysSecret }}
                  key: GH_TOKEN
                  optional: true
          command:
            - sh
            - -c
            - |
              set -e
              LOCAL=/home/openclaw/.local/bin
              OCDIR=/home/openclaw/.openclaw

              # Install gh CLI if not present
              if [ ! -x "$LOCAL/gh" ]; then
                cd /tmp
                curl -sL https://github.com/cli/cli/releases/download/v2.69.0/gh_2.69.0_linux_amd64.tar.gz -o gh.tar.gz
                tar xzf gh.tar.gz
                cp gh_2.69.0_linux_amd64/bin/gh "$LOCAL/gh"
                chmod +x "$LOCAL/gh"
                rm -rf gh.tar.gz gh_2.69.0_linux_amd64
                echo "gh CLI installed"
              else
                echo "gh CLI already installed"
              fi

              # Write git config
              cat > "$OCDIR/.gitconfig" << 'GITCFG'
              [user]
                  name = OpenClaw Agent Fleet
                  email = openclaw@lucas.engineering
              [init]
                  defaultBranch = main
              [push]
                  default = current
              [pull]
                  rebase = false
              [credential]
                  helper = store --file /home/openclaw/.openclaw/.git-credentials
              [url "https://github.com/"]
                  insteadOf = git@github.com:
              [core]
                  hooksPath = /home/openclaw/.openclaw/.git-hooks
              GITCFG

              # Write git credentials if token exists
              if [ -n "$GH_TOKEN" ]; then
                echo "https://lward27:${GH_TOKEN}@github.com" > "$OCDIR/.git-credentials"
                chmod 600 "$OCDIR/.git-credentials"
                echo "git credentials configured"
              fi

              # Create pre-push hook to block direct pushes to main
              mkdir -p "$OCDIR/.git-hooks"
              cat > "$OCDIR/.git-hooks/pre-push" << 'HOOKEOF'
              #!/bin/sh
              while read local_ref local_sha remote_ref remote_sha; do
                if echo "$remote_ref" | grep -q 'refs/heads/main'; then
                  echo ""
                  echo "ERROR: Direct push to main is not allowed!"
                  echo "Create a feature branch and submit a pull request instead:"
                  echo "  git checkout -b <agent-name>/<description>"
                  echo "  git push -u origin <agent-name>/<description>"
                  echo "  gh pr create --title '...' --body '...'"
                  echo ""
                  exit 1
                fi
              done
              exit 0
              HOOKEOF
              chmod +x "$OCDIR/.git-hooks/pre-push"
              echo "pre-push hook installed (blocks direct push to main)"

              echo "git setup complete"
          volumeMounts:
            - name: data
              mountPath: /home/openclaw/.openclaw
            - name: data
              mountPath: /home/openclaw/.local
              subPath: .local
            - name: data
              mountPath: /home/openclaw/.cache
              subPath: .cache
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

        # 7. Install RAG MCP server dependencies
        - name: init-rag-mcp
          image: {{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}
          command:
            - sh
            - -c
            - |
              set -e
              MCP_DIR=/home/openclaw/.openclaw/mcp-servers/rag
              mkdir -p "$MCP_DIR"
              # Copy server script from configmap
              cp /mcp-rag-init/server.py "$MCP_DIR/server.py"
              # Install dependencies using uv
              if [ ! -d "$MCP_DIR/.venv" ]; then
                /home/openclaw/.local/bin/uv venv "$MCP_DIR/.venv" --python python3
              fi
              /home/openclaw/.local/bin/uv pip install --python "$MCP_DIR/.venv/bin/python" \
                "mcp[cli]>=1.0.0" "httpx>=0.28.0" 2>&1 | tail -3
              echo "RAG MCP server ready at $MCP_DIR"
          env:
            - name: HOME
              value: /home/openclaw
          volumeMounts:
            - name: data
              mountPath: /home/openclaw/.openclaw
            - name: data
              mountPath: /home/openclaw/.local
              subPath: .local
            - name: data
              mountPath: /home/openclaw/.cache
              subPath: .cache
            - name: mcp-rag-init
              mountPath: /mcp-rag-init
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      containers:
        # === Main OpenClaw container ===
        - name: openclaw
          image: {{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}
          imagePullPolicy: {{ .Values.openclaw.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
            - name: canvas
              containerPort: 18793
              protocol: TCP
          env:
            - name: HOME
              value: /home/openclaw
            - name: OPENCLAW_DISABLE_BONJOUR
              value: "1"
            - name: OPENCLAW_GATEWAY_HANDSHAKE_TIMEOUT_MS
              value: "10000"
            - name: NPM_CONFIG_PREFIX
              value: /home/openclaw/.local
            - name: NPM_CONFIG_CACHE
              value: /home/openclaw/.cache/npm
            - name: PIP_USER
              value: "1"
            - name: PATH
              value: "/opt/tools:/home/openclaw/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: GIT_CONFIG_GLOBAL
              value: "/home/openclaw/.openclaw/.gitconfig"
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.apiKeysSecret }}
                  key: GH_TOKEN
                  optional: true
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.gatewayTokenSecret }}
                  key: token
          {{- if .Values.openclaw.apiKeysSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.openclaw.apiKeysSecret }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /healthz
              port: 18790
            failureThreshold: 60
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18790
            failureThreshold: 6
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18790
            failureThreshold: 6
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.openclaw.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /home/openclaw/.openclaw
            - name: data
              mountPath: /home/openclaw/.local
              subPath: .local
            - name: data
              mountPath: /home/openclaw/.cache
              subPath: .cache
            - name: tmp
              mountPath: /tmp
            - name: tools-bin
              mountPath: /opt/tools
            - name: ssh-keys
              mountPath: /home/openclaw/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: ssh-keys
              mountPath: /home/openclaw/.ssh/id_ed25519.pub
              subPath: id_ed25519.pub
              readOnly: true
            - name: ssh-keys
              mountPath: /home/openclaw/.ssh/known_hosts
              subPath: known_hosts
              readOnly: true
            - name: ssh-keys
              mountPath: /home/openclaw/.ssh/config
              subPath: config
              readOnly: true
            - name: config
              mountPath: /operator-config
              readOnly: true
            - name: config
              mountPath: /home/openclaw/.openclaw/exec-approvals.json
              subPath: exec-approvals.json
              readOnly: true

        # === Gateway Proxy (nginx) ===
        - name: gateway-proxy
          image: {{ .Values.openclaw.gatewayProxy.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: gw-proxy
              containerPort: 18790
              protocol: TCP
            - name: canvas-proxy
              containerPort: 18794
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: gateway-proxy-tmp
              mountPath: /tmp

        # === OTel Collector (sidecar) ===
        - name: otel-collector
          image: {{ .Values.openclaw.otelCollector.image }}
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/etc/otel-collector/config.yaml"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/otel-collector/config.yaml
              subPath: otel-collector.yaml
              readOnly: true

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: config
          configMap:
            name: {{ .Values.openclaw.name }}-config
        - name: workspace-init
          configMap:
            name: {{ .Values.openclaw.name }}-workspace
        - name: agent-workspace-init
          configMap:
            name: openclaw-agent-workspace-init
        - name: tmp
          emptyDir: {}
        - name: gateway-proxy-tmp
          emptyDir: {}
        - name: tools-bin
          emptyDir: {}
        - name: ssh-keys
          secret:
            secretName: openclaw-ssh
            defaultMode: 0600
        - name: mcp-rag-init
          configMap:
            name: openclaw-mcp-rag
