{{- if .Values.openclaw.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.openclaw.name }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.openclaw.ingress.clusterIssuer }}
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-hash-by: $binary_remote_addr
spec:
  ingressClassName: {{ .Values.openclaw.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.openclaw.ingress.host }}
      secretName: {{ .Values.openclaw.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.openclaw.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.openclaw.name }}
                port:
                  number: 18789
{{- end }}
