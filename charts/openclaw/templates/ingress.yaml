{{- if .Values.openclaw.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.openclaw.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    {{- with .Values.openclaw.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.openclaw.ingress.className }}
  rules:
  - host: {{ .Values.openclaw.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.openclaw.name }}
            port:
              number: 18789
  {{- if .Values.openclaw.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.openclaw.ingress.host }}
    secretName: {{ .Values.openclaw.ingress.tls.secretName }}
  {{- end }}
{{- end }}
