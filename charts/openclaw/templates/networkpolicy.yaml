{{- if .Values.openclaw.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.openclaw.name }}-custom
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.openclaw.name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
  # Prometheus metrics scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 9090
      protocol: TCP
  egress:
  # DNS
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # HTTPS (external APIs - Fireworks AI, etc.)
  - ports:
    - port: 443
      protocol: TCP
  # SSH to homelab VMs
  - to:
    - ipBlock:
        cidr: 192.168.20.0/24
    ports:
    - port: 22
      protocol: TCP
  # Kubernetes API
  - ports:
    - port: 6443
      protocol: TCP
  # OpenTelemetry Collector (monitoring namespace) - OTLP gRPC + HTTP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 4317
      protocol: TCP
    - port: 4318
      protocol: TCP
  # RAG service + Qdrant (apps-prod namespace)
  - to:
    - podSelector:
        matchLabels:
          app: rag-service
    ports:
    - port: 8000
      protocol: TCP
  - to:
    - podSelector:
        matchLabels:
          app: qdrant
    ports:
    - port: 6333
      protocol: TCP
{{- end }}
