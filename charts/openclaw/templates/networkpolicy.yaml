{{- if .Values.openclaw.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.openclaw.name }}-custom
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.openclaw.name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
  egress:
  # DNS
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # HTTPS (external APIs)
  - ports:
    - port: 443
      protocol: TCP
  # Ollama VM on LAN
  - to:
    - ipBlock:
        cidr: {{ .Values.openclaw.networkPolicy.ollamaCIDR }}
    ports:
    - port: 11434
      protocol: TCP
{{- end }}
