apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  bookmarks.yaml: |
    - Monitoring:
        - Grafana:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/grafana.png
              href: https://grafana.lucas.engineering
              description: Metrics & dashboards
        - Prometheus:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/prometheus.png
              href: https://prometheus.lucas.engineering
              description: Metrics collection
        - Uptime Kuma:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/uptime-kuma.png
              href: https://uptime.lucas.engineering
              description: Service monitoring

    - Finance:
        - Finance Frontend:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/yahoo-finance.png
              href: https://finance.lucas.engineering
              description: Finance app UI
        - Finance API:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/python.png
              href: https://finance-db.lucas.engineering
              description: FastAPI backend
        - YFinance Wrapper:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/python.png
              href: https://yfinance.lucas.engineering
              description: Yahoo Finance scraper

    - Platform:
        - ArgoCD:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/argocd.png
              href: https://argocd.lucas.engineering
              description: GitOps deployment
        - OpenClaw:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/robot.png
              href: https://openclaw.lucas.engineering
              description: AI assistant (Nova!)
        - Tekton:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/tekton.png
              href: https://tekton.lucas.engineering
              description: CI/CD pipelines
        - OpenFaaS:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/openfaas.png
              href: https://openfaas.lucas.engineering
              description: Serverless functions

    - Content:
        - Ghost Blog:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/ghost.png
              href: https://blog.lucas.engineering
              description: Blog (ipponusa.com)
        - Directus:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/directus.png
              href: https://admin.reefusion.lucas.engineering
              description: Headless CMS
        - Registry:
            - icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/docker.png
              href: https://registry.lucas.engineering
              description: Container registry

  services.yaml: |
    []

  widgets.yaml: |
    []

  settings.yaml: |
    title: Lucas Engineering
    theme: dark
    color: slate

  docker.yaml: |
    ---

  kubernetes.yaml: |
    ---
