homepage:
  image:
    repository: ghcr.io/gethomepage/homepage
    tag: v0.10.9
  
  # Config persistence - Homepage uses a specific structure
  persistence:
    config:
      enabled: true
      type: pvc
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: local-path
      mountPath: /app/config

  # Service configuration
  service:
    type: ClusterIP
    ports:
      http:
        port: 3000

  # Ingress with TLS
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: home.lucas.engineering
          paths:
            - path: /
              pathType: Prefix
              service:
                name: homepage
                port: 3000
      tls:
        - hosts:
            - home.lucas.engineering
          secretName: home-lucas-engineering-tls

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Homepage configuration
  config:
    # Bookmarks organized by category
    bookmarks:
      - Monitoring:
          - Grafana:
              - icon: grafana.png
                href: https://grafana.lucas.engineering
                description: Metrics & dashboards
          - Prometheus:
              - icon: prometheus.png
                href: https://prometheus.lucas.engineering
                description: Metrics collection
          - Uptime Kuma:
              - icon: uptime-kuma.png
                href: https://uptime.lucas.engineering
                description: Service monitoring
      - Finance Stack:
          - Finance Frontend:
              - icon: si-github
                href: https://finance.lucas.engineering
                description: Finance app UI
          - Finance API:
              - icon: si-fastapi
                href: https://finance-db.lucas.engineering
                description: FastAPI backend
          - YFinance Wrapper:
              - icon: si-python
                href: https://yfinance.lucas.engineering
                description: Yahoo Finance scraper
      - Platform Tools:
          - ArgoCD:
              - icon: argo-icon
                href: https://argocd.lucas.engineering
                description: GitOps deployment
          - OpenClaw:
              - icon: si-openai
                href: https://openclaw.lucas.engineering
                description: AI assistant (Nova!)
          - Tekton:
              - icon: tekton-icon
                href: https://tekton.lucas.engineering
                description: CI/CD pipelines
          - OpenFaaS:
              - icon: openfaas-icon
                href: https://openfaas.lucas.engineering
                description: Serverless functions
      - Content & Data:
          - Ghost Blog:
              - icon: si-ghost
                href: https://blog.lucas.engineering
                description: Blog (ipponusa.com)
          - Directus:
              - icon: directus-icon
                href: https://admin.reefusion.lucas.engineering
                description: Headless CMS
          - Docker Registry:
              - icon: si-docker
                href: https://registry.lucas.engineering
                description: Container registry

    # Services for widget integration (optional - can add API keys later)
    services: []

    # Custom widgets
    widgets: []

    # Layout configuration
    layout:
      Monitoring:
        style: row
        columns: 3
      Finance Stack:
        style: row
        columns: 3
      Platform Tools:
        style: row
        columns: 4
      Content & Data:
        style: row
        columns: 3
