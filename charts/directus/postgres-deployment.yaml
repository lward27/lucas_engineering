apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus-postgres
  namespace: directus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directus-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: directus-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_DB
              value: directus
            - name: POSTGRES_USER
              value: directus
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: db-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: directus-postgres-data
