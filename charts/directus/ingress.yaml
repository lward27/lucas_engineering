apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: directus
  namespace: directus
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: admin.reefusion.lucas.engineering
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: directus
                port:
                  number: 80
