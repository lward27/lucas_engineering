{{- if .Values.sentinel.rbac.metrics.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sentinel-rbac.name" . }}-metrics
  labels:
    {{- include "sentinel-rbac.labels" . | nindent 4 }}
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  # Metrics server API - REQUIRED for kubectl top nodes/pods
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list", "watch"]
  
  # Custom metrics (if using prometheus adapter)
  - apiGroups: ["custom.metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
{{- end }}
