apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.nameOverride }}-seed
  labels:
    app.kubernetes.io/name: {{ .Values.nameOverride }}-seed
    app.kubernetes.io/component: seed
    app.kubernetes.io/part-of: {{ .Values.nameOverride }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "3"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.nameOverride }}-seed
        app.kubernetes.io/component: seed
        app.kubernetes.io/part-of: {{ .Values.nameOverride }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.secretName }}
                  key: postgres-password
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Values.nameOverride }}-postgresql -U {{ .Values.postgresql.user }} -d {{ .Values.postgresql.database }}; do
                sleep 2
              done
              until psql -h {{ .Values.nameOverride }}-postgresql -U {{ .Values.postgresql.user }} -d {{ .Values.postgresql.database }} -Atc "select to_regclass('exp_tables.customer') is not null and to_regclass('public.permission_urlpermission') is not null" | grep -q t; do
                sleep 5
              done
              psql -v ON_ERROR_STOP=1 -h {{ .Values.nameOverride }}-postgresql -U {{ .Values.postgresql.user }} -d {{ .Values.postgresql.database }} -f /seed/seed.sql
          volumeMounts:
            - name: seed
              mountPath: /seed
      volumes:
        - name: seed
          configMap:
            name: {{ .Values.nameOverride }}-seed
