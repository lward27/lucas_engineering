apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride }}-frontend
  labels:
    app.kubernetes.io/name: {{ .Values.nameOverride }}-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: {{ .Values.nameOverride }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.nameOverride }}-frontend
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.nameOverride }}-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: {{ .Values.nameOverride }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nameOverride }}-frontend
  labels:
    app.kubernetes.io/name: {{ .Values.nameOverride }}-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: {{ .Values.nameOverride }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Values.nameOverride }}-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
