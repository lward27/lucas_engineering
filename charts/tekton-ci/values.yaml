namespace: tekton-pipelines

registry:
  host: registry.lucas.engineering
  # Pass --skip-tls-verify if registry uses a self-signed cert.
  # Pass --insecure if registry is plain HTTP.
  kanikoExtraArgs:
    - --skip-tls-verify

# GitHub webhook secret - must be pre-created as a K8s Secret in the tekton-pipelines
# namespace before deploying this chart. Example:
#   kubectl create secret generic github-webhook-secret \
#     --from-literal=secret=<your-webhook-secret> \
#     -n tekton-pipelines
github:
  webhookSecretName: github-webhook-secret
  webhookSecretKey: secret

webhookIngress:
  host: tekton-webhooks.lucas.engineering
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: tekton-webhooks-lucas-engineering-tls

# One entry per microservice. Each service gets its own TriggerBinding,
# TriggerTemplate, and a route in the EventListener.
services:
  finance-app-db-service:
    enabled: true
    repoName: finance_app_database_service
    repoURL: https://github.com/lward27/finance_app_database_service.git
    branch: main
    imageRef: docker-registry.registry.svc.cluster.local:5000/finance_app_database_service:latest
    deployment: finance-app-database-service
    deploymentNamespace: apps-prod
    workspaceStorageSize: 1Gi

  finance-frontend:
    enabled: true
    repoURL: https://github.com/lward27/finance-frontend.git
    branch: main
    imageRef: docker-registry.registry.svc.cluster.local:5000/finance-frontend:latest
    deployment: finance-frontend
    deploymentNamespace: apps-prod
    workspaceStorageSize: 1Gi

  yfinance-wrapper:
    enabled: true
    repoName: yfinance_wrapper
    repoURL: https://github.com/lward27/yfinance_wrapper.git
    branch: main
    imageRef: docker-registry.registry.svc.cluster.local:5000/yfinance_wrapper:latest
    deployment: yfinance-wrapper
    deploymentNamespace: apps-prod
    workspaceStorageSize: 1Gi

  scraper-manager:
    enabled: true
    repoName: scraper_manager
    repoURL: https://github.com/lward27/scraper_manager.git
    branch: main
    imageRef: docker-registry.registry.svc.cluster.local:5000/scraper_manager:latest
    deployment: scraper-manager-scheduler,scraper-manager-worker
    deploymentNamespace: apps-prod
    workspaceStorageSize: 1Gi

  forge-platform:
    enabled: true
    repoName: forge
    repoURL: https://github.com/lward27/forge.git
    branch: main
    imageRef: docker-registry.registry.svc.cluster.local:5000/forge_platform:latest
    dockerfile: "./platform/Dockerfile"
    context: "./platform/"
    deployment: forge-platform
    deploymentNamespace: forge-platform
    workspaceStorageSize: 1Gi

  forge-admin:
    enabled: true
    repoURL: https://github.com/lward27/forge-admin.git
    branch: main
    imageRef: docker-registry.registry.svc.cluster.local:5000/forge_admin:latest
    deployment: forge-admin
    deploymentNamespace: forge-platform
    workspaceStorageSize: 1Gi

  forge-portal:
    enabled: true
    repoURL: https://github.com/lward27/forge-portal.git
    branch: main
    imageRef: docker-registry.registry.svc.cluster.local:5000/forge_portal:latest
    deployment: forge-portal
    deploymentNamespace: forge-platform
    workspaceStorageSize: 1Gi

  data-log-visual-frontend:
    enabled: true
    repoURL: https://github.com/lward27/data-log-visual.git
    branch: main
    imageRef: registry.lucas.engineering/data-log-visual-frontend:latest
    dockerfile: "./frontend/Dockerfile"
    context: "./frontend/"
    deployment: data-log-visual-frontend
    deploymentNamespace: apps-prod
    workspaceStorageSize: 1Gi

  data-log-visual-backend:
    enabled: true
    repoURL: https://github.com/lward27/data-log-visual.git
    branch: main
    imageRef: registry.lucas.engineering/data-log-visual-backend:latest
    dockerfile: "./backend/Dockerfile"
    context: "./backend/"
    deployment: data-log-visual-backend
    deploymentNamespace: apps-prod
    workspaceStorageSize: 1Gi
