apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: rollout-restart
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: tekton-ci
spec:
  description: Restart one or more Kubernetes deployments to pick up a new image.
  params:
    - name: DEPLOYMENT
      type: string
      description: Deployment name or comma-separated deployment names to restart.
    - name: NAMESPACE
      type: string
      description: Namespace of the deployment.
      default: apps-prod
  steps:
    - name: restart
      image: bitnami/kubectl:latest
      script: |
        #!/bin/sh
        set -e
        DEPLOYMENTS="$(params.DEPLOYMENT)"
        OLD_IFS="$IFS"
        IFS=','
        for dep in $DEPLOYMENTS; do
          dep="$(echo "$dep" | tr -d '[:space:]')"
          if [ -z "$dep" ]; then
            continue
          fi
          echo "Restarting deployment/${dep} in $(params.NAMESPACE)..."
          kubectl rollout restart deployment/"${dep}" -n "$(params.NAMESPACE)"
          kubectl rollout status deployment/"${dep}" -n "$(params.NAMESPACE)" --timeout=180s
        done
        IFS="$OLD_IFS"
        echo "Rollout(s) complete."
