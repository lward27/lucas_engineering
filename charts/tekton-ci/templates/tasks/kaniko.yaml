apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/version: "0.6"
    app.kubernetes.io/part-of: tekton-ci
  annotations:
    tekton.dev/pipelines.minVersion: "0.38.0"
    tekton.dev/categories: Image Build
    tekton.dev/tags: image-build
    tekton.dev/displayName: "Build and push container image using Kaniko"
spec:
  description: >-
    Build a Dockerfile with Kaniko and push to a registry.
    Stores the image digest as a result for traceability.
  params:
    - name: IMAGE
      description: Full image reference to build and push (registry/name:tag).
    - name: DOCKERFILE
      description: Path to the Dockerfile to build.
      default: ./Dockerfile
    - name: CONTEXT
      description: The build context used by Kaniko.
      default: ./
    - name: EXTRA_ARGS
      type: array
      default: []
    - name: BUILDER_IMAGE
      description: The Kaniko executor image to use.
      default: gcr.io/kaniko-project/executor:v1.12.1-debug
  workspaces:
    - name: source
      description: Holds the build context and Dockerfile.
    - name: dockerconfig
      description: Optional docker config.json for registry auth (mount as Secret).
      optional: true
      mountPath: /kaniko/.docker
  results:
    - name: IMAGE_DIGEST
      description: Digest of the image just built.
    - name: IMAGE_URL
      description: URL of the image just built.
  steps:
    - name: build-and-push
      workingDir: $(workspaces.source.path)
      image: $(params.BUILDER_IMAGE)
      args:
        - $(params.EXTRA_ARGS)
        - --dockerfile=$(params.DOCKERFILE)
        - --context=$(workspaces.source.path)/$(params.CONTEXT)
        - --destination=$(params.IMAGE)
        - --digest-file=$(results.IMAGE_DIGEST.path)
      securityContext:
        runAsUser: 0
    - name: write-url
      image: docker.io/library/bash:5.1.4@sha256:c523c636b722339f41b6a431b44588ab2f762c5de5ec3bd7964420ff982fb1d9
      script: |
        set -e
        image="$(params.IMAGE)"
        echo -n "${image}" | tee "$(results.IMAGE_URL.path)"
