---
# ServiceAccount used by pipeline task pods (git-clone, kaniko)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-ci-pipeline-sa
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: tekton-ci
---
# ServiceAccount used by the EventListener pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-ci-triggers-sa
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: tekton-ci
---
# Allow the triggers SA to create PipelineRuns and read trigger resources
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-ci-triggers-role
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: tekton-ci
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["triggers.tekton.dev"]
    resources:
      - eventlisteners
      - triggerbindings
      - triggertemplates
      - triggers
      - interceptors
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["impersonate"]
---
# Allow the pipeline SA to restart deployments after builds
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-ci-rollout-restart
  labels:
    app.kubernetes.io/part-of: tekton-ci
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-ci-rollout-restart-binding
  labels:
    app.kubernetes.io/part-of: tekton-ci
subjects:
  - kind: ServiceAccount
    name: tekton-ci-pipeline-sa
    namespace: {{ .Values.namespace }}
  - kind: ServiceAccount
    name: default
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-ci-rollout-restart
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-ci-triggers-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: tekton-ci
subjects:
  - kind: ServiceAccount
    name: tekton-ci-triggers-sa
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-ci-triggers-clusterrolebinding
  labels:
    app.kubernetes.io/part-of: tekton-ci
subjects:
  - kind: ServiceAccount
    name: tekton-ci-triggers-sa
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
