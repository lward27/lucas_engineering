{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: {{ $name }}-binding
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/part-of: tekton-ci
    app.kubernetes.io/component: {{ $name }}
spec:
  params:
    - name: repo-url
      value: $(body.repository.clone_url)
    - name: revision
      value: $(body.after)
{{- end }}
{{- end }}
