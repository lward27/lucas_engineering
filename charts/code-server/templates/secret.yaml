{{- if not .Values.codeServer.passwordSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.codeServer.name }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.codeServer.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  password: {{ .Values.codeServer.password | b64enc }}
{{- end }}
