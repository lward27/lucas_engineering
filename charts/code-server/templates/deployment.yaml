apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.codeServer.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.codeServer.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.codeServer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.codeServer.name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.codeServer.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "code-server.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-config
          image: "{{ .Values.codeServer.image.repository }}:{{ .Values.codeServer.image.tag }}"
          imagePullPolicy: {{ .Values.codeServer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # Create necessary directories with correct permissions
              mkdir -p /home/coder/.local/share/code-server
              mkdir -p /home/coder/.config/code-server
              mkdir -p /home/coder/.kube
              mkdir -p /home/coder/bin
              
              # Copy config from configMap to writable location
              if [ -f /tmp/config/config.yaml ]; then
                cp /tmp/config/config.yaml /home/coder/.config/code-server/config.yaml
              fi
              
              # Install git if not present
              if ! command -v git &> /dev/null; then
                echo "Installing git..."
                apt-get update && apt-get install -y git || true
              fi
              
              # Download kubectl if not present
              if [ ! -f /home/coder/bin/kubectl ]; then
                echo "Downloading kubectl..."
                curl -fsSL -o /home/coder/bin/kubectl "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl"
                chmod +x /home/coder/bin/kubectl
              fi
              
              # Clone the lucas_engineering repository for collaborative editing
              if [ ! -d /home/coder/workspace/lucas_engineering ]; then
                echo "Cloning lucas_engineering repository..."
                mkdir -p /home/coder/workspace
                cd /home/coder/workspace
                git clone https://github.com/lward27/lucas_engineering.git || true
                # Set proper ownership
                chown -R 1000:1000 /home/coder/workspace
              fi
              
              # Create kubeconfig using service account token
              # Connect directly to API server IP since network policy allows it
              cat > /home/coder/.kube/config << 'EOF'
              apiVersion: v1
              kind: Config
              clusters:
              - name: homelab
                cluster:
                  server: https://192.168.20.192:6443
                  insecure-skip-tls-verify: true
              contexts:
              - name: code-server
                context:
                  cluster: homelab
                  namespace: {{ .Release.Namespace }}
                  user: code-server
              current-context: code-server
              users:
              - name: code-server
                user:
                  tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              EOF
              
              # Set correct ownership
              chown -R 1000:1000 /home/coder/.local /home/coder/.config /home/coder/.kube /home/coder/bin /home/coder/workspace 2>/dev/null || true
          volumeMounts:
            - name: data
              mountPath: /home/coder
            - name: config
              mountPath: /tmp/config
          securityContext:
            runAsUser: 0
      containers:
        - name: code-server
          image: "{{ .Values.codeServer.image.repository }}:{{ .Values.codeServer.image.tag }}"
          imagePullPolicy: {{ .Values.codeServer.image.pullPolicy }}
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.codeServer.passwordSecret }}{{ .Values.codeServer.passwordSecret }}{{ else }}{{ .Values.codeServer.name }}-auth{{ end }}
                  key: {{ if .Values.codeServer.passwordSecret }}{{ .Values.codeServer.passwordSecretKey }}{{ else }}password{{ end }}
            - name: XDG_CONFIG_HOME
              value: /home/coder/.config
            - name: PATH
              value: /home/coder/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: KUBECONFIG
              value: /home/coder/.kube/config
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.codeServer.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/coder
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            {{- range .Values.codeServer.extraVolumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: data
          {{- if .Values.codeServer.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.codeServer.name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ .Values.codeServer.name }}-config
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3607
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
        {{- range .Values.codeServer.extraVolumes }}
        - name: {{ .name }}
          {{- toYaml . | nindent 10 }}
        {{- end }}
