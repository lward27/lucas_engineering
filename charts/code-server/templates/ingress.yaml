{{- if .Values.codeServer.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.codeServer.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.codeServer.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- with .Values.codeServer.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.codeServer.ingress.className }}
  rules:
  - host: {{ .Values.codeServer.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.codeServer.name }}
            port:
              number: {{ .Values.codeServer.service.port }}
  {{- if .Values.codeServer.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.codeServer.ingress.host }}
    secretName: {{ .Values.codeServer.ingress.tls.secretName }}
  {{- end }}
{{- end }}
