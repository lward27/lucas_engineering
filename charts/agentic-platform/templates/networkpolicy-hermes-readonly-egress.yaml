{{- if .Values.networkPolicies.hermesReadonlyEgress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-agent-readonly-egress
  namespace: {{ .Values.hermes.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
{{ include "agentic-platform.labels" . | indent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.hermes.appLabelName }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.hermesReadonlyEgress.observabilityNamespace }}
      ports:
        - port: 80
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 3200
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.hermesReadonlyEgress.argocdNamespace }}
      ports:
        - port: 443
          protocol: TCP
        - port: 8080
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 6443
          protocol: TCP
{{- end }}
