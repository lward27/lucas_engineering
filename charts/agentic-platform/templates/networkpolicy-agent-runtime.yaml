{{- if .Values.networkPolicies.agentRuntimeDefaultDeny.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-agent-runtime
  namespace: agent-runtime
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
{{ include "agentic-platform.labels" . | indent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-agent-runtime
  namespace: agent-runtime
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
{{ include "agentic-platform.labels" . | indent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
