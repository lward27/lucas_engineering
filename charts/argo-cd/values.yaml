argo-cd:
  global:
    domain: argocd.lucas.engineering
  configs:
    params:
      server.insecure: "true"
  dex:
    enabled: false
  notifications:
    enabled: false
  applicationSet:
    enabled: false
  server:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
      - hosts:
        - argocd.lucas.engineering
        secretName: argocd-lucas-engineering-tls
