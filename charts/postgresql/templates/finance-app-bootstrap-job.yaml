apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-finance-bootstrap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: bootstrap-finance-db
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.existingSecret }}
              key: {{ .Values.auth.passwordKey }}
        - name: FINANCE_APP_DB
          value: {{ .Values.financeApp.database | quote }}
        - name: FINANCE_APP_USER
          value: {{ .Values.financeApp.user | quote }}
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          export PGPASSWORD="${POSTGRES_PASSWORD}"

          psql \
            -h postgresql.apps-prod.svc.cluster.local \
            -U postgres \
            -d postgres \
            -v finance_user="${FINANCE_APP_USER}" \
            -v finance_db="${FINANCE_APP_DB}" \
            -v finance_password="${POSTGRES_PASSWORD}" <<'SQL'
          DO
          $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'finance_user') THEN
              EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', :'finance_user', :'finance_password');
            ELSE
              EXECUTE format('ALTER ROLE %I WITH LOGIN PASSWORD %L', :'finance_user', :'finance_password');
            END IF;
          END
          $$;

          SELECT format('CREATE DATABASE %I OWNER %I', :'finance_db', :'finance_user')
          WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'finance_db')
          \gexec

          SELECT format('GRANT ALL PRIVILEGES ON DATABASE %I TO %I', :'finance_db', :'finance_user')
          \gexec
          SQL

          psql -h postgresql.apps-prod.svc.cluster.local -U postgres -d "${FINANCE_APP_DB}" -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"
