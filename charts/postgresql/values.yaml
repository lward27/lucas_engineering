image:
  repository: timescale/timescaledb
  tag: latest-pg17
  pullPolicy: IfNotPresent

auth:
  postgresPassword: "topsecretpassword"
  database: "testdb"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 5432

persistence:
  size: 8Gi
  storageClass: local-path
