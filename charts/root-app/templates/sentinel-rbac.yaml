{{- if (index .Values.apps "sentinel-rbac").enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinel-rbac
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lward27/lucas_engineering.git
    path: charts/sentinel-rbac
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring-agents
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
{{- end }}
