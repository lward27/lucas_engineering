{{- if (index .Values.apps "tekton-ci").enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-ci
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lward27/lucas_engineering.git
    path: charts/tekton-ci
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-pipelines
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}
