{{- if (index .Values.apps "finance-frontend").enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finance-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lward27/lucas_engineering.git
    path: charts/finance-frontend
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
{{- end }}
