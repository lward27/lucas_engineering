apiVersion: v1
kind: Service
metadata:
  name: finance-app-database-service
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8091'
    prometheus.io/path: '/metrics'
spec:
  selector:
    app: finance-app-database-service
  ports:
  - protocol: "TCP"
    port: 8091
    targetPort: 8000
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-app-database-service
spec:
  selector:
    matchLabels:
      app: finance-app-database-service
  replicas: 1
  template:
    metadata:
      labels:
        app: finance-app-database-service
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8000'
        prometheus.io/path: '/metrics'
    spec:
      containers:
      - name: finance-app-database-service
        image: registry.lucas.engineering/finance_app_database_service:0.4
        imagePullPolicy: IfNotPresent
        env:
        - name: TEST_VARIABLE
          value: "Value of the test variable"
        ports:
        - containerPort: 8000

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-app-database-service
spec:
  ingressClassName: nginx
  rules:
  - host: finance-db.lucas.engineering
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finance-app-database-service
            port:
              number: 8091