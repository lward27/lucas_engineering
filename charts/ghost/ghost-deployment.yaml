apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ghost
    spec:
      containers:
        - name: ghost
          image: ghost:5-alpine
          env:
            - name: url
              value: https://blog.lucas.engineering
            - name: database__client
              value: mysql
            - name: database__connection__host
              value: ghost-mysql.blog.svc.cluster.local
            - name: database__connection__port
              value: "3306"
            - name: database__connection__user
              value: ghost
            - name: database__connection__password
              valueFrom:
                secretKeyRef:
                  name: ghost-mysql-secret
                  key: mysql-password
            - name: database__connection__database
              value: ghost
          ports:
            - containerPort: 2368
          volumeMounts:
            - name: ghost-content
              mountPath: /var/lib/ghost/content
          livenessProbe:
            httpGet:
              path: /ghost/api/v4/admin/site/
              port: 2368
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ghost/api/v4/admin/site/
              port: 2368
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: ghost-content
          persistentVolumeClaim:
            claimName: ghost-content
