ghost:
  ghostHost: blog.lucas.engineering
  ghostEnableHttps: true
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: blog.lucas.engineering
    path: /
    pathType: ImplementationSpecific
  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path
  mysql:
    image:
      registry: docker.io
      repository: bitnami/mysql
      tag: 8.0
    primary:
      persistence:
        enabled: true
        size: 5Gi
        storageClass: local-path
