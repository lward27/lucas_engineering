mimir-distributed:
  mimir:
    structuredConfig:
      common:
        storage:
          backend: filesystem
  minio:
    enabled: false

  # Disable Kafka - not needed for a single-node deployment
  kafka:
    enabled: false

  # Disable zone-aware replication and use minimal replicas
  ingester:
    zoneAwareReplication:
      enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi

  store_gateway:
    zoneAwareReplication:
      enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  compactor:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  distributor:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  querier:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  query_frontend:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi

  query_scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi

  ruler:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi

  alertmanager:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 64Mi

  overrides_exporter:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 64Mi

  rollout_operator:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 64Mi
