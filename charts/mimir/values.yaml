mimir-distributed:
  mimir:
    structuredConfig:
      common:
        storage:
          backend: filesystem
      # Override chart default of s3 to use local filesystem
      blocks_storage:
        backend: filesystem
        filesystem:
          dir: /data/blocks
        bucket_store:
          sync_dir: /data/tsdb-sync
      # Separate data dirs so none overlap with blocks_storage.filesystem.dir
      compactor:
        data_dir: /data/compactor
      ruler:
        rule_path: /data/ruler
      alertmanager:
        data_dir: /data/alertmanager
      # Disable Kafka-based ingest storage — use classic push path instead
      ingest_storage:
        enabled: false
      ingester:
        push_grpc_method_enabled: true
        ring:
          replication_factor: 1
      limits:
        max_global_series_per_user: 10000000
      store_gateway:
        sharding_ring:
          replication_factor: 1
  minio:
    enabled: false

  # Disable Kafka - not needed for a single-node deployment
  kafka:
    enabled: false

  # Disable zone-aware replication and use minimal replicas
  ingester:
    zoneAwareReplication:
      enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    # Use stable release instead of RC
    image:
      tag: 3.0.0

  store_gateway:
    zoneAwareReplication:
      enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  compactor:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  distributor:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  querier:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  query_frontend:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi

  query_scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi

  ruler:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi

  alertmanager:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 64Mi

  overrides_exporter:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 64Mi

  rollout_operator:
    enabled: false
