prometheus:
  server:
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - prometheus.lucas.engineering
      tls:
        - hosts:
            - prometheus.lucas.engineering
          secretName: prometheus-lucas-engineering-tls
    remoteWrite:
      - url: http://mimir-gateway.monitoring.svc/api/v1/push
        write_relabel_configs:
          - action: labeldrop
            regex: '.*\..*'
  extraScrapeConfigs: |
    - job_name: mimir
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - monitoring
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          regex: mimir
          action: keep
        - source_labels: [__meta_kubernetes_pod_container_port_name]
          regex: http-metrics
          action: keep
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          target_label: component
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
    - job_name: loki
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - monitoring
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          regex: loki
          action: keep
        - source_labels: [__meta_kubernetes_pod_container_port_name]
          regex: http-metrics
          action: keep
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          target_label: component
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
    - job_name: ingress-nginx
      static_configs:
        - targets:
          - ingress-nginx-controller-metrics.ingress-nginx.svc.cluster.local:10254
    - job_name: opentelemetry-collector
      static_configs:
        - targets:
          - opentelemetry-collector.monitoring.svc.cluster.local:8888
    - job_name: openfaas-gateway
      static_configs:
        - targets:
          - gateway.openfaas.svc.cluster.local:8080
      metrics_path: /metrics
    - job_name: openclaw
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - apps-prod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          regex: openclaw
          action: keep
        - source_labels: [__meta_kubernetes_pod_container_port_name]
          regex: http|metrics
          action: keep
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
      metrics_path: /metrics
