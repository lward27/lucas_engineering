apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-manager-scheduler
  labels:
    app: scraper-manager
    component: scheduler
    version: v3.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scraper-manager
      component: scheduler
  template:
    metadata:
      labels:
        app: scraper-manager
        component: scheduler
        version: v3.0.0
    spec:
      containers:
      - name: scraper-manager-scheduler
        image: registry.lucas.engineering/scraper_manager:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health
          protocol: TCP
        env:
        - name: MODE
          value: "scheduler"
        - name: SHADOW_MODE
          value: "true"
        - name: DATABASE_SERVICE_URL
          value: "http://finance-app-database-service.apps-prod.svc.cluster.local:8091"
        - name: YFINANCE_SERVICE_URL
          value: "http://yfinance-wrapper.apps-prod.svc.cluster.local:8090"
        - name: RABBITMQ_URL
          value: "amqp://finance_app_user:finance_app_user@rabbitmq.apps-prod.svc.cluster.local:5672/"
        - name: RABBITMQ_WORK_QUEUE
          value: "scraper.ticker.work"
        - name: RABBITMQ_RETRY_QUEUE
          value: "scraper.ticker.retry"
        - name: RABBITMQ_DLQ_QUEUE
          value: "scraper.ticker.dlq"
        - name: RABBITMQ_PREFETCH_COUNT
          value: "8"
        - name: SCHEDULER_TIMEZONE
          value: "America/New_York"
        - name: SCHEDULER_RUN_HOUR
          value: "19"
        - name: SCHEDULER_RUN_MINUTE
          value: "0"
        - name: SCHEDULER_WEEKDAYS
          value: "0,1,2,3,4"
        - name: SCHEDULER_POLL_SECONDS
          value: "30"
        - name: SCHEDULER_PAGE_SIZE
          value: "500"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"
        - name: HEALTH_PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-manager-worker
  labels:
    app: scraper-manager
    component: worker
    version: v3.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scraper-manager
      component: worker
  template:
    metadata:
      labels:
        app: scraper-manager
        component: worker
        version: v3.0.0
    spec:
      containers:
      - name: scraper-manager-worker
        image: registry.lucas.engineering/scraper_manager:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health
          protocol: TCP
        env:
        - name: MODE
          value: "worker"
        - name: SHADOW_MODE
          value: "true"
        - name: DATABASE_SERVICE_URL
          value: "http://finance-app-database-service.apps-prod.svc.cluster.local:8091"
        - name: YFINANCE_SERVICE_URL
          value: "http://yfinance-wrapper.apps-prod.svc.cluster.local:8090"
        - name: RABBITMQ_URL
          value: "amqp://finance_app_user:finance_app_user@rabbitmq.apps-prod.svc.cluster.local:5672/"
        - name: RABBITMQ_WORK_QUEUE
          value: "scraper.ticker.work"
        - name: RABBITMQ_RETRY_QUEUE
          value: "scraper.ticker.retry"
        - name: RABBITMQ_DLQ_QUEUE
          value: "scraper.ticker.dlq"
        - name: RABBITMQ_PREFETCH_COUNT
          value: "8"
        - name: CHUNK_DAYS
          value: "90"
        - name: BATCH_SIZE
          value: "500"
        - name: REQUEST_TIMEOUT
          value: "30"
        - name: BATCH_TIMEOUT
          value: "60"
        - name: STATUS_CHECK_TIMEOUT
          value: "120"
        - name: WORKER_MAX_RETRIES
          value: "5"
        - name: WORKER_RETRY_BASE_DELAY_SECONDS
          value: "10"
        - name: WORKER_RETRY_MAX_DELAY_SECONDS
          value: "300"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"
        - name: HEALTH_PORT
          value: "8080"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
