apiVersion: batch/v1
kind: Job
metadata:
  name: scraper-manager
  labels:
    app: scraper-manager
    version: v2.0.0
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 14400
  template:
    metadata:
      labels:
        app: scraper-manager
        version: v2.0.0
    spec:
      containers:
      - name: scraper-manager
        image: registry.lucas.engineering/scraper_manager:v2.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health
          protocol: TCP
        env:
        - name: DATABASE_SERVICE_URL
          value: "http://finance-app-database-service.apps-prod.svc.cluster.local:8091"
        - name: YFINANCE_SERVICE_URL
          value: "http://yfinance-wrapper.apps-prod.svc.cluster.local:8090"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"
        - name: MAX_WORKERS
          value: "8"
        - name: MAX_CONCURRENT_YFINANCE_CALLS
          value: "4"
        - name: MAX_CONCURRENT_DB_CALLS
          value: "4"
        - name: HEALTH_PORT
          value: "8080"
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Never
