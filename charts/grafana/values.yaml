grafana:
  service:
    type: ClusterIP
  persistence:
    enabled: true
  initChownData:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.lucas.engineering
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi