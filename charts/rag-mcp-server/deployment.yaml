apiVersion: v1
kind: Service
metadata:
  name: rag-mcp-server
spec:
  selector:
    app: rag-mcp-server
  ports:
  - protocol: "TCP"
    port: 8080
    targetPort: 8080
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-mcp-server
spec:
  selector:
    matchLabels:
      app: rag-mcp-server
  replicas: 1
  template:
    metadata:
      labels:
        app: rag-mcp-server
    spec:
      containers:
      - name: rag-mcp-server
        image: registry.lucas.engineering/rag_mcp_server:latest
        imagePullPolicy: Always
        env:
        - name: MCP_TRANSPORT
          value: "http"
        - name: MCP_PORT
          value: "8080"
        - name: RAG_API_URL
          value: "http://rag-service.apps-prod.svc.cluster.local:8000"
        - name: RAG_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: rag-service-secrets
              key: api-token
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
