{{- if .Values.nanoclaw.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.nanoclaw.name }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.nanoclaw.name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Only allow traffic from within the nanoclaw namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
  egress:
  # DNS
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # HTTPS (Fireworks AI API, Telegram API, GitHub for cloning)
  - ports:
    - port: 443
      protocol: TCP
  # HTTP (npm registry, some package mirrors)
  - ports:
    - port: 80
      protocol: TCP
{{- end }}
